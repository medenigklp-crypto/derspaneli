<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4F46E5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Ders Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#EEF2FF;padding-bottom:80px;}
.hdr{background:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hdr h1{font-size:20px;font-weight:bold;color:#4F46E5;}
.hdr p{font-size:11px;color:#6b7280;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}
.st{border-radius:16px;padding:16px;color:#fff;}
.st p{font-size:11px;opacity:.85;}
.st h2{font-size:22px;font-weight:bold;}
.s1{background:linear-gradient(135deg,#6366f1,#4338ca);}
.s2{background:linear-gradient(135deg,#22c55e,#15803d);}
.s3{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.s4{background:linear-gradient(135deg,#ef4444,#b91c1c);}
.qb{display:flex;gap:8px;padding:0 12px 12px;}
.btn{padding:10px 16px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer;flex:1;}
.bp{background:#4F46E5;color:#fff;}
.bd{background:#1f2937;color:#fff;}
.bg{background:#22c55e;color:#fff;}
.bsm{padding:6px 10px;font-size:11px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;gap:2px;margin:0 12px 12px;overflow-x:auto;}
.tab{flex:1;min-width:50px;padding:8px 2px;border:none;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;background:transparent;color:#6b7280;}
.tab.on{background:#4F46E5;color:#fff;}
.card{background:#fff;border-radius:16px;padding:16px;margin:0 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.it{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:8px;}
.it.g{border-color:#86efac;background:#f0fdf4;}
.it.n{border-color:#fca5a5;background:#fff1f2;}
.it.e{border-color:#fcd34d;background:#fffbeb;}
.row{display:flex;justify-content:space-between;align-items:center;}
.empty{text-align:center;padding:32px;color:#9ca3af;font-size:14px;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.mod{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;z-index:200;}
.ys{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.yg{background:#dcfce7;color:#15803d;}
.yn{background:#fee2e2;color:#dc2626;}
.ye{background:#fef3c7;color:#d97706;}
.yb{background:#f3f4f6;color:#6b7280;}
.oc{border:1.5px solid #e5e7eb;border-radius:16px;margin-bottom:12px;overflow:hidden;}
.och{padding:12px;cursor:pointer;background:#fff;}
.ocb{padding:12px;background:#f9fafb;border-top:1px solid #e5e7eb;}
.br2{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;}
.br2:last-child{border-bottom:none;}
.og{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.oi{background:#f9fafb;border-radius:10px;padding:8px;text-align:center;}
.oi h3{font-size:20px;font-weight:bold;}
.oi p{font-size:10px;color:#6b7280;}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cdn{font-size:10px;color:#6b7280;font-weight:600;padding:4px 0;}
.cd{font-size:12px;padding:5px 2px;border-radius:8px;cursor:pointer;min-height:30px;}
.cd.td{background:#4F46E5;color:#fff;font-weight:700;}
.dot{width:6px;height:6px;border-radius:50%;background:#ef4444;margin:0 auto;margin-top:1px;}
.dot.y{background:#22c55e;}
.ptb{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;gap:3px;margin-bottom:12px;}
.ptb button{flex:1;padding:6px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th,td{border:1px solid #e5e7eb;padding:5px 3px;text-align:center;}
th{background:#f9fafb;font-weight:600;}
.thl{background:#eef2ff;font-weight:700;}
.tto{background:#e0e7ff;}
</style>
</head>
<body>
<div id="root"></div>
<script>
var S={
  ogr:[],prg:[],yok:[],odv:[],dnm:[],
  prem:false,para:true,tab:'bugun',
  cAy:new Date().getMonth(),cYil:new Date().getFullYear(),
  cGun:null,yokF:'',acikOgr:null,prgGor:'liste'
};

function yukle(){
  ['ogr','prg','yok','odv','dnm','prem'].forEach(function(k){
    try{ var v=localStorage.getItem('dp2_'+k); if(v) S[k]=JSON.parse(v); }catch(e){}
  });
}
function kaydet(k){ try{ localStorage.setItem('dp2_'+k,JSON.stringify(S[k])); }catch(e){} }
function pad(n){ return String(n).padStart(2,'0'); }

function bugun(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function yarin(){
  var d=new Date(); d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

var GUNLER=['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'];

function gunAdi(tarih){
  return GUNLER[new Date(tarih).getDay()];
}

function getOgr(id){ return S.ogr.find(function(o){ return o.id==id; })||{}; }

function wa(tel,msg){
  if(!tel) return;
  var t=tel.replace(/\D/g,'');
  if(!t.startsWith('90')) t=t.startsWith('0')?'90'+t.slice(1):'90'+t;
  window.open('https://wa.me/'+t+'?text='+encodeURIComponent(msg),'_blank');
}
function tg(user,msg){
  if(!user) return;
  window.open('https://t.me/'+user.replace('@','')+('?text='+encodeURIComponent(msg)),'_blank');
}

function toast(msg,color){
  var el=document.createElement('div');
  el.className='toast'; el.style.background=color||'#1f2937'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },2500);
}

function dkHesap(bas,bit){
  if(!bas||!bit) return 45;
  var b=bas.split(':'), e=bit.split(':');
  return (parseInt(e[0])*60+parseInt(e[1]))-(parseInt(b[0])*60+parseInt(b[1]));
}
function dsSaati(bas,bit){ return Math.ceil(dkHesap(bas,bit)/45)||1; }
function ucretHesap(plan,ogr){ return dsSaati(plan.bas,plan.bit)*parseInt(ogr.ucret||0); }

function bugunPrg(){
  var g=gunAdi(bugun());
  return S.prg.filter(function(p){ return p.gun===g; })
    .sort(function(a,b){ return (a.bas||'').localeCompare(b.bas||''); });
}

function getYok(pid,tarih){
  return S.yok.find(function(y){ return y.pid===pid&&y.tarih===tarih; });
}

function yokKaydet(pid,durum){
  var tarih=bugun();
  var plan=S.prg.find(function(p){ return p.id===pid; });
  var ogr=plan?getOgr(plan.ogr):null;
  var ucr=(durum==='g'&&plan&&ogr&&ogr.ucret)?ucretHesap(plan,ogr):0;
  var mev=getYok(pid,tarih);
  if(mev){
    S.yok=S.yok.map(function(y){
      return(y.pid===pid&&y.tarih===tarih)?{id:y.id,pid:pid,tarih:tarih,durum:durum,ogrId:y.ogrId,ucret:ucr,odendi:y.odendi}:y;
    });
  } else {
    S.yok.push({id:Date.now(),pid:pid,tarih:tarih,durum:durum,ogrId:plan?plan.ogr:null,ucret:ucr,odendi:false});
  }
  kaydet('yok');
  var c={g:'#22c55e',n:'#ef4444',e:'#f59e0b'};
  var t={g:'Geldi!',n:'Gelmedi!',e:'Ertelendi!'};
  toast(t[durum],c[durum]);
  ciz();
}

function ciz(){ document.getElementById('root').innerHTML=html(); }

function html(){
  var bg=bugun(), bp=bugunPrg();
  var bgld=bp.filter(function(p){ var y=getYok(p.id,bg); return y&&y.durum==='g'; }).length;
  var topK=S.yok.filter(function(y){ return y.durum==='g'; }).reduce(function(s,y){ return s+parseInt(y.ucret||0); },0);
  var bK=S.yok.filter(function(y){ return y.durum==='g'&&y.tarih===bg; }).reduce(function(s,y){ return s+parseInt(y.ucret||0); },0);
  var bek=S.yok.filter(function(y){ return y.durum==='g'&&!y.odendi; }).reduce(function(s,y){ return s+parseInt(y.ucret||0); },0);
  var sm=S.para;
  var h='';
  h+='<div class="hdr"><div><h1>Ders Paneli</h1><p>'+new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'})+'</p></div>';
  h+='<span style="font-size:11px;padding:4px 8px;border-radius:8px;background:'+(S.prem?'#ede9fe':'#f3f4f6')+';color:'+(S.prem?'#6d28d9':'#374151')+'">'+(S.prem?'Premium':'Ucretsiz')+'</span></div>';
  h+='<div class="sg">';
  h+='<div class="st s1"><p>Bugun</p><h2>'+bp.length+'</h2><p>'+bgld+' geldi</p></div>';
  h+='<div class="st s2"><p>Toplam</p><h2>'+(sm?'&#8378;'+topK:'...')+'</h2><p>kazanc</p></div>';
  h+='<div class="st s3"><p>Bugun</p><h2>'+(sm?'&#8378;'+bK:'...')+'</h2><p>kazanildi</p></div>';
  h+='<div class="st s4" style="position:relative;"><button onclick="S.para=!S.para;ciz();" style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;font-size:14px;color:#fff;">'+(sm?'&#128065;':'&#128584;')+'</button>';
  h+='<p>Bekleyen</p><h2>'+(sm?'&#8378;'+bek:'...')+'</h2><p>odeme</p></div></div>';
  h+='<div class="qb">';
  h+='<button class="btn bp" onclick="setTab(\'program\')">Program</button>';
  h+='<button class="btn bd" onclick="ogrModal()">+Ogrenci</button>';
  h+='<button class="btn bg" onclick="hatirlatma()">Hatirlatma</button>';
  h+='</div>';
  h+='<div class="tabs">';
  [['bugun','Bugun'],['takvim','Takvim'],['program','Program'],['yoklama','Yoklama'],['ogrenciler','Ogrenciler'],['odevler','Odevler'],['denemeler','Denemeler']].forEach(function(t){
    h+='<button class="tab'+(S.tab===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';
  });
  h+='</div>';
  h+='<div class="card">';
  if(S.tab==='bugun') h+=tabBugun();
  else if(S.tab==='takvim') h+=tabTakvim();
  else if(S.tab==='program') h+=tabProgram();
  else if(S.tab==='yoklama') h+=tabYoklama();
  else if(S.tab==='ogrenciler') h+=tabOgrenciler();
  else if(S.tab==='odevler') h+=tabOdevler();
  else if(S.tab==='denemeler') h+=tabDenemeler();
  h+='</div>';
  return h;
}

function tabBugun(){
  var bg=bugun(), bp=bugunPrg();
  var h='<p style="font-weight:700;margin-bottom:12px;">Bugunun Dersleri</p>';
  if(bp.length===0) return h+'<div class="empty">Bugun ders yok<br><small>Program sekmesinden ekleyin</small></div>';
  bp.forEach(function(plan){
    var ogr=getOgr(plan.ogr);
    var y=getYok(plan.id,bg);
    var dur=y?y.durum:'b';
    var ds=dsSaati(plan.bas,plan.bit);
    var ucr=ogr.ucret?ucretHesap(plan,ogr):0;
    var cls='it'+(dur==='g'?' g':dur==='n'?' n':dur==='e'?' e':'');
    h+='<div class="'+cls+'">';
    h+='<div class="row" style="margin-bottom:8px;">';
    h+='<div><p style="font-weight:600;">'+(ogr.ad||'?')+'</p>';
    h+='<p style="font-size:11px;color:#6b7280;">'+plan.bas+' - '+plan.bit+' ('+ds+' saat)</p>';
    if(S.para&&ogr.ucret) h+='<p style="font-size:11px;color:#4F46E5;font-weight:600;">&#8378;'+ucr+'</p>';
    h+='</div>';
    var yc='ys '+(dur==='g'?'yg':dur==='n'?'yn':dur==='e'?'ye':'yb');
    var yt=dur==='g'?'Geldi':dur==='n'?'Gelmedi':dur==='e'?'Ertelendi':'Bekliyor';
    h+='<span class="'+yc+'">'+yt+'</span></div>';
    h+='<div style="display:flex;gap:4px;flex-wrap:wrap;">';
    h+='<button class="bsm bg" onclick="yokKaydet('+plan.id+',\'g\')">Geldi</button>';
    h+='<button class="bsm" style="background:#ef4444;color:#fff;" onclick="yokKaydet('+plan.id+',\'n\')">Gelmedi</button>';
    h+='<button class="bsm" style="background:#f97316;color:#fff;" onclick="yokKaydet('+plan.id+',\'e\')">Ertelendi</button>';
    if(ogr.tel) h+='<button class="bsm" style="background:#25D366;color:#fff;" onclick="wa(\''+ogr.tel+'\',\'Bugun '+plan.bas+' daki ders hatirlatmasi\')">WA</button>';
    h+='</div></div>';
  });
  return h;
}

function tabTakvim(){
  var ay=S.cAy,yil=S.cYil;
  var ayAd=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var bg=bugun();
  var simdi=new Date(), hb=new Date(simdi);
  var gn=simdi.getDay(); hb.setDate(simdi.getDate()+(gn===0?-6:1-gn));
  var he=new Date(hb); he.setDate(hb.getDate()+6);
  var hbS=hb.getFullYear()+'-'+pad(hb.getMonth()+1)+'-'+pad(hb.getDate());
  var heS=he.getFullYear()+'-'+pad(he.getMonth()+1)+'-'+pad(he.getDate());
  var gunler=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  var hTop=0;
  gunler.forEach(function(g){ hTop+=S.prg.filter(function(p){ return p.gun===g; }).length; });
  var hYap=S.yok.filter(function(y){ return y.tarih>=hbS&&y.tarih<=heS&&y.durum==='g'; }).length;
  var hIpt=S.yok.filter(function(y){ return y.tarih>=hbS&&y.tarih<=heS&&y.durum==='n'; }).length;
  var hKal=Math.max(0,hTop-hYap-hIpt);
  var h='';
  h+='<p style="font-size:11px;color:#6b7280;font-weight:600;margin-bottom:6px;">Bu Hafta</p>';
  h+='<div class="og">';
  h+='<div class="oi"><h3 style="color:#4F46E5;">'+hTop+'</h3><p>Toplam</p></div>';
  h+='<div class="oi"><h3 style="color:#22c55e;">'+hYap+'</h3><p>Yapilan</p></div>';
  h+='<div class="oi"><h3 style="color:#ef4444;">'+hIpt+'</h3><p>Iptal</p></div>';
  h+='<div class="oi"><h3 style="color:#f59e0b;">'+hKal+'</h3><p>Kalan</p></div>';
  h+='</div>';
  h+='<div class="ch">';
  h+='<button class="bsm" style="background:#e5e7eb;color:#374151;" onclick="S.cAy--;if(S.cAy<0){S.cAy=11;S.cYil--;}ciz();">&#8592;</button>';
  h+='<span style="font-weight:700;">'+ayAd[ay]+' '+yil+'</span>';
  h+='<button class="bsm" style="background:#e5e7eb;color:#374151;" onclick="S.cAy++;if(S.cAy>11){S.cAy=0;S.cYil++;}ciz();">&#8594;</button>';
  h+='</div>';
  h+='<div class="cg">';
  ['Pzt','Sal','Car','Per','Cum','Cmt','Paz'].forEach(function(g){ h+='<div class="cdn">'+g+'</div>'; });
  var ilk=new Date(yil,ay,1).getDay();
  var off=ilk===0?6:ilk-1;
  var son=new Date(yil,ay+1,0).getDate();
  for(var i=0;i<off;i++) h+='<div></div>';
  for(var d=1;d<=son;d++){
    var tar=yil+'-'+pad(ay+1)+'-'+pad(d);
    var gAd=gunAdi(tar);
    var dS=S.prg.filter(function(p){ return p.gun===gAd; }).length;
    var gS=S.yok.filter(function(y){ return y.tarih===tar&&y.durum==='g'; }).length;
    var isTd=tar===bg, isSel=S.cGun===tar;
    h+='<div class="cd'+(isTd?' td':'')+'" onclick="S.cGun=S.cGun===\''+tar+'\'?null:\''+tar+'\';ciz();" style="'+(isSel&&!isTd?'background:#e0e7ff;':'')+'">'+d;
    if(dS>0) h+='<div class="dot'+(gS>0?' y':'')+'"></div>';
    h+='</div>';
  }
  h+='</div>';
  if(S.cGun){
    var sg=S.cGun, sgAd=gunAdi(sg);
    var sgP=S.prg.filter(function(p){ return p.gun===sgAd; }).sort(function(a,b){ return (a.bas||'').localeCompare(b.bas||''); });
    h+='<p style="font-weight:600;margin:12px 0 6px;">'+sg+' Dersleri</p>';
    if(sgP.length===0) h+='<p style="font-size:11px;color:#6b7280;">Ders yok</p>';
    else sgP.forEach(function(plan){
      var ogr=getOgr(plan.ogr);
      var y2=getYok(plan.id,sg);
      var d2=y2?y2.durum:'b';
      var ds=dsSaati(plan.bas,plan.bit);
      h+='<div class="it row" style="padding:8px 12px;">';
      h+='<div><p style="font-weight:600;font-size:13px;">'+(ogr.ad||'?')+'</p>';
      h+='<p style="font-size:11px;color:#6b7280;">'+plan.bas+'-'+plan.bit+' ('+ds+'s)</p></div>';
      var yc2='ys '+(d2==='g'?'yg':d2==='n'?'yn':d2==='e'?'ye':'yb');
      h+='<span class="'+yc2+'">'+(d2==='g'?'Geldi':d2==='n'?'Gelmedi':d2==='e'?'Ertelendi':'Bekliyor')+'</span>';
      h+='</div>';
    });
  }
  return h;
}

function tabProgram(){
  var g=S.prgGor;
  var h='<div class="row" style="margin-bottom:12px;">';
  h+='<p style="font-weight:700;">Haftalik Program</p>';
  h+='<button class="bsm bp" onclick="prgModal()">+ Ekle</button></div>';
  h+='<div class="ptb">';
  h+='<button onclick="S.prgGor=\'liste\';ciz();" style="'+(g==='liste'?'background:#4F46E5;color:#fff;':'background:transparent;color:#6b7280;')+'">Liste</button>';
  h+='<button onclick="S.prgGor=\'tablo\';ciz();" style="'+(g==='tablo'?'background:#4F46E5;color:#fff;':'background:transparent;color:#6b7280;')+'">Haftalik Tablo</button>';
  h+='</div>';
  if(S.prg.length===0) return h+'<div class="empty">Henuz program yok</div>';
  if(g==='tablo') return h+prgTablo();
  return h+prgListe();
}

function prgListe(){
  var gunler=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  var h='';
  gunler.forEach(function(gun){
    var gp=S.prg.filter(function(p){ return p.gun===gun; }).sort(function(a,b){ return (a.bas||'').localeCompare(b.bas||''); });
    if(gp.length===0) return;
    h+='<p style="font-weight:600;font-size:13px;margin:10px 0 6px;color:#4F46E5;">'+gun+'</p>';
    gp.forEach(function(plan){
      var ogr=getOgr(plan.ogr);
      var ds=dsSaati(plan.bas,plan.bit);
      var ucr=ogr.ucret?ucretHesap(plan,ogr):0;
      h+='<div class="it row">';
      h+='<div><p style="font-weight:600;">'+(ogr.ad||'?')+'</p>';
      h+='<p style="font-size:11px;color:#6b7280;">'+plan.bas+' - '+plan.bit+'</p>';
      h+='<p style="font-size:11px;color:#4F46E5;">'+ds+' saat'+(S.para&&ogr.ucret?' = &#8378;'+ucr:'')+'</p>';
      h+='</div>';
      h+='<button class="bsm" style="background:#ef4444;color:#fff;" onclick="prgSil('+plan.id+')">Sil</button>';
      h+='</div>';
    });
  });
  return h;
}

function prgTablo(){
  var gunler=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  var gunK=['Pzt','Sal','Car','Per','Cum','Cmt','Paz'];
  var bg=gunAdi(bugun());
  var saatler={};
  S.prg.forEach(function(p){ saatler[p.bas]=1; });
  var sl=Object.keys(saatler).sort();
  if(sl.length===0) return '<div class="empty">Program bos</div>';
  var h='<div style="overflow-x:auto;"><table><thead><tr><th>Saat</th>';

  h+='<div style="flex:1"><label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">TYT Net</label><input id="dTyt" type="number" step="0.5" placeholder="85.5" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"></div>';
  h+='<div style="flex:1"><label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">AYT Net</label><input id="dAyt" type="number" step="0.5" placeholder="60.0" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"></div></div>';
  h+='<div class="fg"><label>Not</label><input id="dNot" placeholder="Matematik dusuk"></div>';
  h+='<div style="display:flex;gap:8px;">';
  h+='<button class="btn bp" onclick="dnmKaydet()">Ekle</button>';
  h+='<button class="btn" style="background:#e5e7eb;color:#374151;" onclick="kapModal(\'mdnm\')">Iptal</button>';
  h+='</div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}
function dnmKaydet(){
  var oid=document.getElementById('dO').value;
  var ad=document.getElementById('dAd').value.trim();
  if(!oid||!ad){ toast('Ogrenci ve ad zorunlu!','#f59e0b'); return; }
  S.dnm.push({id:Date.now(),ogr:Number(oid),ad:ad,tarih:document.getElementById('dTar').value,tyt:document.getElementById('dTyt').value||'-',ayt:document.getElementById('dAyt').value||'-',not:document.getElementById('dNot').value});
  kaydet('dnm'); kapModal('mdnm'); toast('Eklendi!','#22c55e'); ciz();
}

yukle();
ciz();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/derspaneli/service-worker.js').catch(function(){});
}
