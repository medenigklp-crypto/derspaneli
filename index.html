<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="manifest.json">
    <title>📚 Ders Paneli</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="apple-touch-icon" href="icon-180.png">
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior: none; touch-action: pan-x pan-y; }
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        }
        #splash {
            position: fixed; width: 100%; height: 100%; background: #4B2EFF; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 28px;
            font-weight: bold; z-index: 9999;
        }
        .fade-out { opacity: 0; transition: 0.6s; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

<div id="splash">
  <h1>DERS PANELİ</h1>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ name, size = 20, className = "" }) => {
        const icons = {
            users: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            calendar: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            book: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
            dollar: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>,
            plus: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            x: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            edit: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            trash: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        };
        return icons[name] || null;
    };
    
    const DersPanel = () => {
        const [ogrenciler, setOgrenciler] = useState([]);
        const [odevler, setOdevler] = useState([]);
        const [dersler, setDersler] = useState([]);
        const [dersProgrami, setDersProgrami] = useState([]);
        const [isPremium, setIsPremium] = useState(false);
        const [activeTab, setActiveTab] = useState('program');
        const [showMoney, setShowMoney] = useState(true);
        const [seciliOgrenci, setSeciliOgrenci] = useState("tum");
        const [showOgrenciModal, setShowOgrenciModal] = useState(false);
        const [showOdevModal, setShowOdevModal] = useState(false);
        const [showOdevSoru, setShowOdevSoru] = useState(false);
        const [showUpgrade, setShowUpgrade] = useState(false);

        const [ogrenciForm, setOgrenciForm] = useState({ ad: '', telefon: '', sinif: '', ucret: '' });
        const [odevForm, setOdevForm] = useState({ ogrenciId: '', konu: '', aciklama: '', durum: "yapilmadi" });
        const [programForm, setProgramForm] = useState({ ogrenciId: "", gun: "", basSaat: "", basDakika: "", bitSaat: "", bitDakika: "" });
        const [seciliTarih, setSeciliTarih] = useState(() => new Date().toISOString().split("T")[0]);
        const [popup, setPopup] = useState({ show: false, message: "", type: "info" });

        const normalizeDate = (date) => {
            if (!date) return null;
            const d = new Date(date);
            if (isNaN(d.getTime())) return null;
            return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
        };

        const bugunStr = normalizeDate(new Date());
        const LIMITS = { student: 5, homework: 10, program: 5, lesson: 5 };
        const saatler = Array.from({ length: 15 }, (_, i) => 8 + i);

        const canAdd = (type) => {
            if (isPremium) return true;
            if (type === "student") return ogrenciler.length < LIMITS.student;
            if (type === "homework") return odevler.length < LIMITS.homework;
            if (type === "program") return dersProgrami.length < LIMITS.program;
            return true;
        };

        useEffect(() => {
            try {
                setDersProgrami(JSON.parse(localStorage.getItem("derspanel_program") || "[]"));
                setOgrenciler(JSON.parse(localStorage.getItem("derspanel_ogrenciler") || "[]"));
                setOdevler(JSON.parse(localStorage.getItem("derspanel_odevler") || "[]"));
                setDersler(JSON.parse(localStorage.getItem("derspanel_dersler") || "[]"));
            } catch (err) { console.error(err); }
        }, []);

        useEffect(() => { localStorage.setItem("derspanel_program", JSON.stringify(dersProgrami)); }, [dersProgrami]);
        useEffect(() => { localStorage.setItem("derspanel_ogrenciler", JSON.stringify(ogrenciler)); }, [ogrenciler]);
        useEffect(() => { localStorage.setItem("derspanel_odevler", JSON.stringify(odevler)); }, [odevler]);
        useEffect(() => { localStorage.setItem("derspanel_dersler", JSON.stringify(dersler)); }, [dersler]);

        const getOgrenciAd = (id) => {
            const ogrenci = ogrenciler.find(o => o.id === parseInt(id));
            return ogrenci ? ogrenci.ad : 'Bilinmeyen';
        };

        const ogrenciKaydet = () => {
            if (!ogrenciForm.ad) return;
            if (!canAdd("student")) { setShowUpgrade(true); return; }
            setOgrenciler([...ogrenciler, { ...ogrenciForm, id: Date.now() }]);
            setShowOgrenciModal(false);
        };

        const ogrenciSil = (id) => { if(confirm('Silinsin mi?')) setOgrenciler(ogrenciler.filter(o => o.id !== id)); };

        const odevEkle = () => {
            if (!odevForm.konu || !odevForm.ogrenciId) return;
            if (!canAdd("homework")) { setShowUpgrade(true); return; }
            setOdevler([...odevler, { ...odevForm, id: Date.now() }]);
            setShowOdevModal(false);
        };

        const odevSil = (id) => { setOdevler(odevler.filter(o => o.id !== id)); };
        const odevDurumDegistir = (id, d) => { setOdevler(odevler.map(o => o.id === id ? {...o, durum: d} : o)); };

        const dersGerceklesti = (plan) => {
            const ucr = ogrenciler.find(o => o.id === Number(plan.ogrenciId))?.ucret || 0;
            setDersler([...dersler, { ...plan, id: Date.now(), odendi: false, ucret: ucr, durum: "tamamlandi" }]);
            setDersProgrami(dersProgrami.filter(p => p.id !== plan.id));
        };

        const programKaydet = () => {
            if(!programForm.ogrenciId || !programForm.gun) return;
            if(!canAdd("program")) { setShowUpgrade(true); return; }
            const bas = `${String(programForm.basSaat).padStart(2,"0")}:00`;
            const bit = `${String(programForm.bitSaat).padStart(2,"0")}:00`;
            setDersProgrami([...dersProgrami, { id: Date.now(), ogrenciId: Number(programForm.ogrenciId), gun: programForm.gun, baslangic: bas, bitis: bit, tarih: seciliTarih }]);
            setProgramForm({ ogrenciId: "", gun: "", basSaat: "", basDakika: "", bitSaat: "", bitDakika: "" });
        };

        const odemeDurumDegistir = (id) => { setDersler(dersler.map(d => d.id === id ? { ...d, odendi: !d.odendi } : d)); };

        const bugunDersler = dersProgrami.filter(p => p.tarih === bugunStr);
        const toplamKazanc = dersler.reduce((sum, d) => sum + Number(d.ucret || 0), 0);
        const bekleyenOdeme = dersler.filter(d => !d.odendi).reduce((sum, d) => sum + Number(d.ucret || 0), 0);

        return (
            <div className="min-h-screen pb-20">
                <div className="bg-white shadow px-4 py-4 sticky top-0 z-10 flex justify-between items-center">
                    <div>
                        <h1 className="text-xl font-bold text-indigo-600">📚 Ders Paneli</h1>
                        <p className="text-gray-500 text-xs">Yönetim Sistemi</p>
                    </div>
                    <button onClick={() => setIsPremium(!isPremium)} className={`text-xs px-3 py-1.5 rounded-lg font-bold ${isPremium ? "bg-purple-600 text-white" : "bg-gray-100 text-gray-700"}`}>
                        {isPremium ? "💎 Premium" : "🆓 Ücretsiz"}
                    </button>
                </div>

                <div className="p-4 grid grid-cols-2 gap-3">
                    <div className="bg-indigo-600 text-white p-4 rounded-xl shadow">
                        <p className="text-xs opacity-80">Bugünkü Dersler</p>
                        <h3 className="text-xl font-bold">{bugunDersler.length}</h3>
                    </div>
                    <div className="bg-green-600 text-white p-4 rounded-xl shadow relative">
                        <p className="text-xs opacity-80">Toplam Kazanç</p>
                        <h3 className="text-xl font-bold">₺{toplamKazanc}</h3>
                    </div>
                </div>

                <div className="grid grid-cols-5 gap-1 px-2 mb-4">
                    {['program', 'ogrenciler', 'dersler', 'odevler', 'muhasebe'].map(t => (
                        <button key={t} onClick={() => setActiveTab(t)} className={`py-2 text-[10px] font-bold rounded-lg ${activeTab === t ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 shadow-sm'}`}>
                            {t.toUpperCase()}
                        </button>
                    ))}
                </div>

                {activeTab === 'program' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <h3 className="font-bold mb-3 text-sm">🗓 Haftalık Ders Programı</h3>
                        <div className="space-y-2 mb-4">
                            {dersProgrami.map(p => (
                                <div key={p.id} className="p-3 border rounded-lg flex justify-between items-center bg-gray-50">
                                    <div>
                                        <p className="font-bold text-sm text-gray-800">{getOgrenciAd(p.ogrenciId)}</p>
                                        <p className="text-xs text-gray-500">{p.gun} | {p.baslangic} - {p.bitis}</p>
                                    </div>
                                    <button onClick={() => { dersGerceklesti(p); setSeciliOgrenci(p.ogrenciId); setShowOdevSoru(true); }} className="bg-green-600 text-white text-xs px-3 py-1 rounded shadow">Geldi</button>
                                </div>
                            ))}
                        </div>
                        <div className="p-3 bg-indigo-50 rounded-xl">
                            <p className="text-xs font-bold mb-2 text-indigo-800">Yeni Ders Saati Ekle</p>
                            <select onChange={e=>setProgramForm({...programForm, ogrenciId: e.target.value})} className="w-full text-xs p-2 border rounded mb-2 bg-white">
                                <option value="">Öğrenci Seçin</option>
                                {ogrenciler.map(o=><option key={o.id} value={o.id}>{o.ad}</option>)}
                            </select>
                            <select onChange={e=>setProgramForm({...programForm, gun: e.target.value})} className="w-full text-xs p-2 border rounded mb-2 bg-white">
                                <option value="">Gün Seçin</option>
                                <option>Pazartesi</option><option>Salı</option><option>Çarşamba</option><option>Perşembe</option><option>Cuma</option><option>Cumartesi</option><option>Pazar</option>
                            </select>
                            <div className="grid grid-cols-2 gap-2 mb-3">
                                <select onChange={e=>setProgramForm({...programForm, basSat: e.target.value})} className="text-xs p-2 border rounded bg-white"><option value="">Başl. Saat</option>{saatler.map(s=><option key={s}>{s}</option>)}</select>
                                <select onChange={e=>setProgramForm({...programForm, bitSat: e.target.value})} className="text-xs p-2 border rounded bg-white"><option value="">Bitiş Saat</option>{saatler.map(s=><option key={s}>{s}</option>)}</select>
                            </div>
                            <button onClick={programKaydet} className="w-full bg-indigo-600 text-white text-xs py-2 rounded font-bold shadow">Programa Ekle</button>
                        </div>
                    </div>
                )}

                {activeTab === 'ogrenciler' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-sm">👨‍🎓 Kayıtlı Öğrenciler</h3>
                            <button onClick={() => setShowOgrenciModal(true)} className="bg-indigo-600 text-white text-xs px-3 py-1 rounded shadow">+ Yeni</button>
                        </div>
                        <div className="space-y-2">
                            {ogrenciler.map(o => (
                                <div key={o.id} className="p-3 border rounded-lg flex justify-between items-center">
                                    <div>
                                        <p className="font-bold text-sm">{o.ad}</p>
                                        <p className="text-xs text-gray-500">Sınıf: {o.sinif} | Ücret: ₺{o.ucret}</p>
                                    </div>
                                    <button onClick={()=>ogrenciSil(o.id)} className="text-red-600 text-xs bg-red-50 px-2 py-1 rounded">Sil</button>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {activeTab === 'dersler' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <h3 className="font-bold mb-3 text-sm">✅ Tamamlanan Dersler</h3>
                        <div className="space-y-2">
                            {dersler.map(d => (
                                <div key={d.id} className={`p-3 border rounded-lg flex justify-between items-center ${d.odendi ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                    <div>
                                        <p className="font-bold text-sm">{getOgrenciAd(d.ogrenciId)}</p>
                                        <p className="text-xs text-gray-500">{d.gun} | ₺{d.ucret}</p>
                                    </div>
                                    <button onClick={()=>odemeDurumDegistir(d.id)} className={`text-xs px-2 py-1 rounded font-bold text-white ${d.odendi ? 'bg-green-600' : 'bg-yellow-500'}`}>
                                        {d.odendi ? 'Ödendi' : 'Bekliyor'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {activeTab === 'odevler' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-sm">📚 Ödev Takibi</h3>
                            <button onClick={() => setShowOdevModal(true)} className="bg-indigo-600 text-white text-xs px-3 py-1 rounded shadow">+ Ödev Ver</button>
                        </div>
                        <div className="space-y-2">
                            {odevler.map(o => (
                                <div key={o.id} className="p-3 border rounded-lg bg-gray-50">
                                    <div className="flex justify-between items-center mb-1">
                                        <p className="font-bold text-sm">{getOgrenciAd(o.ogrenciId)}</p>
                                        <span className="text-xs font-bold text-indigo-600">{o.durum.toUpperCase()}</span>
                                    </div>
                                    <p className="text-xs text-gray-700">📌 Konu: {o.konu}</p>
                                    <div className="flex gap-1 mt-2 justify-end">
                                        <button onClick={()=>odevDurumDegistir(o.id, 'yapildi')} className="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded">Yapıldı</button>
                                        <button onClick={()=>odevDurumDegistir(o.id, 'yapilmadi')} className="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded">Yapılmadı</button>
                                        <button onClick={()=>odevSil(o.id)} className="text-gray-400 text-[10px] ml-2">Sil</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {activeTab === 'muhasebe' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <h3 className="font-bold mb-3 text-sm">📊 Gelir Detayları</h3>
                        <div className="space-y-2">
                            {ogrenciler.map(o => {
                                const oDers = dersler.filter(d => Number(d.ogrenciId) === o.id);
                                const oOdenen = oDers.filter(d => d.odendi).reduce((sum, d) => sum + Number(d.ucret), 0);
                                const oBekleyen = oDers.filter(d => !d.odendi).reduce((sum, d) => sum + Number(d.ucret), 0);
                                return (
                                    <div key={o.id} className="p-3 border rounded-lg flex justify-between items-center">
                                        <p className="font-bold text-sm text-gray-800">{o.ad}</p>
                                        <div className="text-right text-xs">
                                            <p className="text-green-600 font-bold">Alınan: ₺{oOdenen}</p>
                                            <p className="text-red-500">Bekleyen: ₺{oBekleyen}</p>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

                {showOgrenciModal && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div className="bg-white p-4 rounded-xl w-full max-w-xs shadow-2xl">
                            <h4 className="font-bold text-sm mb-3">Öğrenci Bilgileri</h4>
                            <input type="text" placeholder="Ad Soyad" value={ogrenciForm.ad} onChange={e=>setOgrenciForm({...ogrenciForm, ad:e.target.value})} className="w-full p-2 border rounded text-xs mb-2 bg-white"/>
                            <input type="number" placeholder="Ders Ücreti (₺)" value={ogrenciForm.ucret} onChange={e=>setOgrenciForm({...ogrenciForm, ucret:e.target.value})} className="w-full p-2 border rounded text-xs mb-2 bg-white"/>
                            <input type="text" placeholder="Sınıfı" value={ogrenciForm.sinif} onChange={e=>setOgrenciForm({...ogrenciForm, sinif:e.target.value})} className="w-full p-2 border rounded text-xs mb-3 bg-white"/>
                            <div className="flex gap-2"><button onClick={ogrenciKaydet} className="bg-indigo-600 text-white text-xs py-2 rounded flex-1 font-bold shadow">Kaydet</button><button onClick={()=>setShowOgrenciModal(false)} className="bg-gray-200 text-xs py-2 rounded flex-1">Kapat</button></div>
                        </div>
                    </div>
                )}

                {showOdevModal && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div className="bg-white p-4 rounded-xl w-full max-w-xs shadow-2xl">
                            <h4 className="font-bold text-sm mb-3">Yeni Ödev Formu</h4>
                            <select onChange={e=>setOdevForm({...odevForm, ogrenciId: e.target.value})} className="w-full text-xs p-2 border rounded mb-2 bg-white">
                                <option value="">Öğrenci Seçin</option>
                                {ogrenciler.map(o=><option key={o.id} value={o.id}>{o.ad}</option>)}
                            </select>
                            <input type="text" placeholder="Ödev Konusu" value={odevForm.konu} onChange={e=>setOdevForm({...odevForm, konu:e.target.value})} className="w-full p-2 border rounded text-xs mb-3 bg-white"/>
                            <div className="flex gap-2"><button onClick={odevEkle} className="bg-indigo-600 text-white text-xs py-2 rounded flex-1 font-bold">Ödevi Ver</button><button onClick={()=>setShowOdevModal(false)} className="bg-gray-200 text-xs py-2 rounded flex-1">İptal</button></div>
                        </div>
                    </div>
                )}

                {showOdevSoru && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div className="bg-white p-5 rounded-xl w-72 text-center shadow-2xl">
                            <p className="text-sm font-bold text-gray-800 mb-4">Ders tamamlandı. Yeni bir ödev eklemek ister misiniz?</p>
                            <div className="flex gap-2">
                                <button onClick={() => { setOdevForm({ ogrenciId: seciliOgrenci, konu: '', aciklama: '', durum: 'yapilmadi' }); setShowOdevSoru(false); setShowOdevModal(true); }} className="bg-green-600 text-white text-xs py-2 rounded flex-1 font-bold">Evet</button>
                                <button onClick={() => { setShowOdevSoru(false); }} className="bg-gray-300 text-gray-700 text-xs py-2 rounded flex-1">Hayır</button>
                            </div>
                        </div>
                    </div>
                )}

                {showUpgrade && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div className="bg-white p-5 rounded-xl w-72 text-center shadow-2xl">
                            <h3 className="font-bold text-purple-700 text-base mb-1">💎 Limit Sınırı</h3>
                            <p className="text-xs text-gray-600 mb-4">Ücretsiz sürüm sınırına ulaştınız. Sınırsız kullanım için Premium modunu açabilirsiniz.</p>
                            <button onClick={() => { setIsPremium(true); setShowUpgrade(false); }} className="w-full bg-purple-600 text-white text-xs py-2 rounded font-bold mb-2">Premium Modu Aç</button>
                            <button onClick={() => setShowUpgrade(false)} className="text-xs text-gray-400">Vazgeç</button>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    ReactDOM.render(<DersPanel />, document.getElementById('root'));
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/derspaneli/service-worker.js')
  .then(reg => console.log("SW Aktif", reg))
  .catch(err => console.error("SW Hata", err));
}
</script>

<script>
