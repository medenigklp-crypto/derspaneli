<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4F46E5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Ders Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF2FF;min-height:100vh;padding-bottom:80px;}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:16px;margin:0 12px 12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}
.stat{border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden;}
.stat p{font-size:11px;opacity:.85;}
.stat h2{font-size:26px;font-weight:bold;}
.s1{background:linear-gradient(135deg,#6366f1,#4338ca);}
.s2{background:linear-gradient(135deg,#22c55e,#15803d);}
.s3{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.s4{background:linear-gradient(135deg,#ef4444,#b91c1c);}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn:active{opacity:.7;}
.btn-primary{background:#4F46E5;color:#fff;}
.btn-dark{background:#1f2937;color:#fff;}
.btn-green{background:#22c55e;color:#fff;}
.btn-gray{background:#e5e7eb;color:#374151;}
.btn-red{background:#ef4444;color:#fff;}
.btn-yellow{background:#f59e0b;color:#fff;}
.btn-orange{background:#f97316;color:#fff;}
.btn-sm{padding:6px 10px;font-size:11px;border-radius:8px;}
.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;gap:2px;margin:0 12px 12px;overflow-x:auto;}
.tab{flex:1;min-width:52px;padding:8px 4px;border:none;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;background:transparent;color:#6b7280;white-space:nowrap;}
.tab.active{background:#4F46E5;color:#fff;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:bold;margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;}
.item{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:8px;background:#fff;}
.item.geldi{border-color:#86efac;background:#f0fdf4;}
.item.gelmedi{border-color:#fca5a5;background:#fff1f2;}
.item.ertelendi{border-color:#fcd34d;background:#fffbeb;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.text-sm{font-size:13px;}
.text-xs{font-size:11px;}
.text-gray{color:#6b7280;}
.text-indigo{color:#4F46E5;}
.text-green{color:#16a34a;}
.font-bold{font-weight:700;}
.font-semi{font-weight:600;}
.row-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.empty{text-align:center;padding:32px;color:#9ca3af;font-size:14px;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;z-index:200;pointer-events:none;white-space:nowrap;}
.header{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
.header h1{font-size:20px;font-weight:bold;color:#4F46E5;}
.header p{font-size:11px;color:#6b7280;}
.badge{font-size:11px;padding:4px 8px;border-radius:8px;font-weight:600;}
.badge-free{background:#f3f4f6;color:#374151;}
.badge-premium{background:#ede9fe;color:#6d28d9;}
.quick-btns{display:flex;gap:8px;padding:0 12px 12px;flex-wrap:wrap;}
.quick-btns .btn{flex:1;min-width:80px;font-size:12px;}
.ys{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.ys-geldi{background:#dcfce7;color:#15803d;}
.ys-gelmedi{background:#fee2e2;color:#dc2626;}
.ys-ertelendi{background:#fef3c7;color:#d97706;}
.ys-bekliyor{background:#f3f4f6;color:#6b7280;}
/* Takvim */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cal-day-name{font-size:10px;color:#6b7280;font-weight:600;padding:4px 0;}
.cal-day{font-size:12px;padding:6px 2px;border-radius:8px;cursor:pointer;position:relative;min-height:32px;}
.cal-day.today{background:#4F46E5;color:#fff;font-weight:700;}
.cal-day.has-lesson{font-weight:600;}
.cal-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;margin:0 auto;margin-top:2px;}
.cal-dot.yesil{background:#22c55e;}
/* Haftalik ozet */
.ozet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.ozet-item{background:#f9fafb;border-radius:12px;padding:10px;text-align:center;}
.ozet-item h3{font-size:22px;font-weight:bold;}
.ozet-item p{font-size:10px;color:#6b7280;}
.ozet-toplam h3{color:#4F46E5;}
.ozet-yapilan h3{color:#22c55e;}
.ozet-iptal h3{color:#ef4444;}
.ozet-kalan h3{color:#f59e0b;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var state = {
  ogrenciler:[],program:[],yoklama:[],odevler:[],denemeler:[],
  isPremium:false,showMoney:true,activeTab:'bugun',
  calAy: new Date().getMonth(), calYil: new Date().getFullYear(),
  yoklamaFiltre:'', LIMITS:{student:5,program:20}
};

function load(){
  ['ogrenciler','program','yoklama','odevler','denemeler','isPremium'].forEach(function(k){
    try{ var v=localStorage.getItem('dp_'+k); if(v) state[k]=JSON.parse(v); }catch(e){}
  });
}
function save(k){ try{ localStorage.setItem('dp_'+k,JSON.stringify(state[k])); }catch(e){} }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function tomorrowStr(){
  var d=new Date(); d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function gunAdiTR(tarih){
  var g=['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'];
  return g[new Date(tarih).getDay()];
}
function getOgrenci(id){ return state.ogrenciler.find(function(o){ return o.id==id; }); }
function getOgrenciAd(id){ var o=getOgrenci(id); return o?o.ad:'Bilinmeyen'; }
function canAdd(t){
  if(state.isPremium) return true;
  if(t==='student') return state.ogrenciler.length<state.LIMITS.student;
  if(t==='program') return state.program.length<state.LIMITS.program;
  return true;
}
function sendWhatsApp(tel,msg){
  if(!tel){ toast('Telefon yok!','#f59e0b'); return; }
  var t=tel.replace(/\D/g,'');
  if(!t.startsWith('90')) t=t.startsWith('0')?'90'+t.slice(1):'90'+t;
  window.open('https://wa.me/'+t+'?text='+encodeURIComponent(msg),'_blank');
}
function toast(msg,color){
  var el=document.createElement('div');
  el.className='toast'; el.style.background=color||'#1f2937'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); },2500);
}
function getBugunProgram(){
  var g=gunAdiTR(todayStr());
  return state.program.filter(function(p){ return p.gun===g; })
    .sort(function(a,b){ return (a.baslangic||'').localeCompare(b.baslangic||''); });
}
function getYoklama(pid,tarih){
  return state.yoklama.find(function(y){ return y.programId===pid && y.tarih===tarih; });
}
function yoklamaKaydet(pid,durum){
  var tarih=todayStr();
  var mevcut=getYoklama(pid,tarih);
  var plan=state.program.find(function(p){ return p.id===pid; });
  var ogr=plan?getOgrenci(plan.ogrenciId):null;
  if(mevcut){
    state.yoklama=state.yoklama.map(function(y){
      return(y.programId===pid&&y.tarih===tarih)?Object.assign({},y,{durum:durum,ucret:(durum==='geldi'&&ogr)?Number(ogr.ucret||0):0}):y;
    });
  } else {
    state.yoklama.push({id:Date.now(),programId:pid,tarih:tarih,durum:durum,ogrenciId:plan?plan.ogrenciId:null,ucret:(durum==='geldi'&&ogr)?Number(ogr.ucret||0):0,odendi:false});
  }
  save('yoklama');
  var msgs={geldi:'Geldi!','#22c55e':true,gelmedi:'Gelmedi!',ertelendi:'Ertelendi!'};
  var colors={geldi:'#22c55e',gelmedi:'#ef4444',ertelendi:'#f59e0b'};
  toast(durum==='geldi'?'Geldi!':durum==='gelmedi'?'Gelmedi!':'Ertelendi!', colors[durum]);
  render();
}

function render(){ document.getElementById('app').innerHTML=buildApp(); }

function buildApp(){
  var bugun=todayStr();
  var bugunP=getBugunProgram();
  var bugunGeldi=bugunP.filter(function(p){ var y=getYoklama(p.id,bugun); return y&&y.durum==='geldi'; }).length;
  var toplamK=state.yoklama.filter(function(y){ return y.durum==='geldi'; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
  var bugunK=state.yoklama.filter(function(y){ return y.durum==='geldi'&&y.tarih===bugun; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
  var bekleyen=state.yoklama.filter(function(y){ return y.durum==='geldi'&&!y.odendi; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
  var sm=state.showMoney;
  var html='';

  html+='<div class="header"><div><h1>Ders Paneli</h1><p>'+new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'})+'</p></div>';
  html+='<span class="badge '+(state.isPremium?'badge-premium':'badge-free')+'">'+(state.isPremium?'Premium':'Ucretsiz')+'</span></div>';

  html+='<div class="stat-grid">';
  html+='<div class="stat s1"><p>Bugun</p><h2>'+bugunP.length+'</h2><p>'+bugunGeldi+' geldi</p></div>';
  html+='<div class="stat s2"><p>Toplam</p><h2>'+(sm?'&#8378;'+toplamK.toFixed(0):'...')+'</h2><p>kazanc</p></div>';
  html+='<div class="stat s3"><p>Bugun</p><h2>'+(sm?'&#8378;'+bugunK.toFixed(0):'...')+'</h2><p>kazanildi</p></div>';
  html+='<div class="stat s4"><button onclick="toggleMoney()" style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;font-size:14px;color:#fff;">'+(sm?'&#128065;':'&#128584;')+'</button><p>Bekleyen</p><h2>'+(sm?'&#8378;'+bekleyen.toFixed(0):'...')+'</h2><p>odeme</p></div>';
  html+='</div>';

  html+='<div class="quick-btns">';
  html+='<button class="btn btn-primary" onclick="setTab(\'program\')">Program</button>';
  html+='<button class="btn btn-dark" onclick="openOgrenciModal()">+ Ogrenci</button>';
  html+='<button class="btn btn-green" onclick="sendTomorrowReminders()">Hatirlatma</button>';
  html+='</div>';

  html+='<div class="tabs">';
  [['bugun','Bugun'],['takvim','Takvim'],['program','Program'],['yoklama','Yoklama'],['ogrenciler','Ogrenciler'],['odevler','Odevler'],['denemeler','Denemeler']].forEach(function(t){
    html+='<button class="tab'+(state.activeTab===t[0]?' active':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';
  });
  html+='</div>';

  html+='<div class="card" id="tab-content">';
  if(state.activeTab==='bugun') html+=buildBugunTab();
  else if(state.activeTab==='takvim') html+=buildTakvimTab();
  else if(state.activeTab==='program') html+=buildProgramTab();
  else if(state.activeTab==='yoklama') html+=buildYoklamaTab();
  else if(state.activeTab==='ogrenciler') html+=buildOgrencilerTab();
  else if(state.activeTab==='odevler') html+=buildOdevlerTab();
  else if(state.activeTab==='denemeler') html+=buildDenemelerTab();
  html+='</div>';
  return html;
}

function buildBugunTab(){
  var bugun=todayStr();
  var bugunP=getBugunProgram();
  var html='<p class="font-bold" style="margin-bottom:12px;">Bugunun Dersleri</p>';
  if(bugunP.length===0){
    html+='<div class="empty">Bugun ders yok<br><small>Program sekmesinden ders ekleyin</small></div>';
    return html;
  }
  bugunP.forEach(function(plan){
    var ogr=getOgrenci(plan.ogrenciId);
    var y=getYoklama(plan.id,bugun);
    var durum=y?y.durum:'bekliyor';
    var cls='item'+(durum!=='bekliyor'?' '+durum:'');
    html+='<div class="'+cls+'">';
    html+='<div class="flex-between" style="margin-bottom:8px;">';
    html+='<div>';
    html+='<p class="font-semi">'+(ogr?ogr.ad:'?')+'</p>';
    html+='<p class="text-xs text-gray">'+plan.baslangic+' - '+plan.bitis+'</p>';
    if(state.showMoney&&ogr) html+='<p class="text-xs text-indigo">&#8378;'+ogr.ucret+' /ders</p>';
    html+='</div>';
    var sc='ys ys-'+durum;
    var st=durum==='geldi'?'Geldi':durum==='gelmedi'?'Gelmedi':durum==='ertelendi'?'Ertelendi':'Bekliyor';
    html+='<span class="'+sc+'">'+st+'</span></div>';
    html+='<div class="row-btns">';
    html+='<button class="btn btn-green btn-sm" onclick="yoklamaKaydet('+plan.id+',\'geldi\')">Geldi</button>';
    html+='<button class="btn btn-red btn-sm" onclick="yoklamaKaydet('+plan.id+',\'gelmedi\')">Gelmedi</button>';
    html+='<button class="btn btn-orange btn-sm" onclick="yoklamaKaydet('+plan.id+',\'ertelendi\')">Ertelendi</button>';
    if(ogr&&ogr.telefon) html+='<button class="btn btn-sm" style="background:#dcfce7;color:#15803d;" onclick="waHat(\''+ogr.telefon+'\',\''+plan.baslangic+'\')">WA</button>';
    html+='</div></div>';
  });
  return html;
}

function waHat(tel,saat){ sendWhatsApp(tel,'Merhaba, bugun saat '+saat+' daki dersimiz icin hatirlatma.'); }

function buildTakvimTab(){
  var ay=state.calAy, yil=state.calYil;
  var ayAdlari=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var gunAdlari=['Pzt','Sal','Car','Per','Cum','Cmt','Paz'];
  var bugun=todayStr();

  // Haftalik ozet (bu hafta)
  var simdi=new Date();
  var haftaBas=new Date(simdi);
  var gun=simdi.getDay(); var fark=gun===0?-6:1-gun;
  haftaBas.setDate(simdi.getDate()+fark);
  var haftaBit=new Date(haftaBas); haftaBit.setDate(haftaBas.getDate()+6);
  var haftaBasStr=haftaBas.getFullYear()+'-'+pad(haftaBas.getMonth()+1)+'-'+pad(haftaBas.getDate());
  var haftaBitStr=haftaBit.getFullYear()+'-'+pad(haftaBit.getMonth()+1)+'-'+pad(haftaBit.getDate());

  // Bu haftaki program gunleri
  var haftaGunleri=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  var haftaToplam=0;
  for(var gi=0;gi<7;gi++){
    var gTarih=new Date(haftaBas); gTarih.setDate(haftaBas.getDate()+gi);
    var gStr=gTarih.getFullYear()+'-'+pad(gTarih.getMonth()+1)+'-'+pad(gTarih.getDate());
    var gAd=haftaGunleri[gi];
    haftaToplam+=state.program.filter(function(p){ return p.gun===gAd; }).length;
  }
  var haftaYapilan=state.yoklama.filter(function(y){ return y.tarih>=haftaBasStr&&y.tarih<=haftaBitStr&&y.durum==='geldi'; }).length;
  var haftaIptal=state.yoklama.filter(function(y){ return y.tarih>=haftaBasStr&&y.tarih<=haftaBitStr&&y.durum==='gelmedi'; }).length;
  var haftaKalan=Math.max(0,haftaToplam-haftaYapilan-haftaIptal);

  var html='';
  // Ozet
  html+='<p class="font-semi text-xs text-gray" style="margin-bottom:6px;">Bu Hafta ('+haftaBasStr.slice(5)+' - '+haftaBitStr.slice(5)+')</p>';
  html+='<div class="ozet-grid">';
  html+='<div class="ozet-item ozet-toplam"><h3>'+haftaToplam+'</h3><p>Toplam</p></div>';
  html+='<div class="ozet-item ozet-yapilan"><h3>'+haftaYapilan+'</h3><p>Yapilan</p></div>';
  html+='<div class="ozet-item ozet-iptal"><h3>'+haftaIptal+'</h3><p>Iptal</p></div>';
  html+='<div class="ozet-item ozet-kalan"><h3>'+haftaKalan+'</h3><p>Kalan</p></div>';
  html+='</div>';

  // Takvim navigasyon
  html+='<div class="cal-header">';
  html+='<button class="btn btn-gray btn-sm" onclick="calNav(-1)">&#8592;</button>';
  html+='<span class="font-bold">'+ayAdlari[ay]+' '+yil+'</span>';
  html+='<button class="btn btn-gray btn-sm" onclick="calNav(1)">&#8594;</button>';
  html+='</div>';

  // Gun isimleri
  html+='<div class="cal-grid">';
  gunAdlari.forEach(function(g){ html+='<div class="cal-day-name">'+g+'</div>'; });

  // Ilk gun offset
  var ilkGun=new Date(yil,ay,1).getDay();
  var offset=ilkGun===0?6:ilkGun-1;
  var sonGun=new Date(yil,ay+1,0).getDate();

  for(var i=0;i<offset;i++) html+='<div></div>';

  for(var d=1;d<=sonGun;d++){
    var tarih=yil+'-'+pad(ay+1)+'-'+pad(d);
    var gAd2=gunAdiTR(tarih);
    var dersSayisi=state.program.filter(function(p){ return p.gun===gAd2; }).length;
    var geldiSayisi=state.yoklama.filter(function(y){ return y.tarih===tarih&&y.durum==='geldi'; }).length;
    var isToday=tarih===bugun;
    var cls='cal-day'+(isToday?' today':'')+(dersSayisi>0?' has-lesson':'');
    html+='<div class="'+cls+'" onclick="calGunSec(\''+tarih+'\')">'+d;
    if(dersSayisi>0){
      html+='<div class="cal-dot'+(geldiSayisi>0?' yesil':'')+'" title="'+dersSayisi+' ders"></div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // Secili gun dersleri
  if(state.calSeciliGun){
    var sg=state.calSeciliGun;
    var sgAd=gunAdiTR(sg);
    var sgProgram=state.program.filter(function(p){ return p.gun===sgAd; });
    html+='<p class="font-semi" style="margin:12px 0 6px;">'+sg+' Dersleri</p>';
    if(sgProgram.length===0){
      html+='<p class="text-xs text-gray">Bu gun ders yok</p>';
    } else {
      sgProgram.forEach(function(plan){
        var ogr=getOgrenci(plan.ogrenciId);
        var y2=getYoklama(plan.id,sg);
        var d2=y2?y2.durum:'bekliyor';
        html+='<div class="item flex-between" style="padding:8px 12px;">';
        html+='<div><p class="font-semi text-sm">'+(ogr?ogr.ad:'?')+'</p>';
        html+='<p class="text-xs text-gray">'+plan.baslangic+'-'+plan.bitis+'</p></div>';
        html+='<span class="ys ys-'+d2+'">'+(d2==='geldi'?'Geldi':d2==='gelmedi'?'Gelmedi':d2==='ertelendi'?'Ertelendi':'Bekliyor')+'</span>';
        html+='</div>';
      });
    }
  }
  return html;
}

function calNav(dir){
  state.calAy+=dir;
  if(state.calAy>11){ state.calAy=0; state.calYil++; }
  if(state.calAy<0){ state.calAy=11; state.calYil--; }
  render();
}
function calGunSec(tarih){ state.calSeciliGun=tarih; render(); }

function buildProgramTab(){
  var html='<div class="flex-between" style="margin-bottom:12px;">';
  html+='<p class="font-bold">Haftalik Program</p>';
  html+='<button class="btn btn-primary btn-sm" onclick="openProgramModal()">+ Ekle</button></div>';
  var gunler=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  if(state.program.length===0){
    html+='<div class="empty">Henuz program yok<br><small>Yil boyu sabit programinizi ekleyin</small></div>';
    return html;
  }
  gunler.forEach(function(gun){
    var gp=state.program.filter(function(p){ return p.gun===gun; })
      .sort(function(a,b){ return (a.baslangic||'').localeCompare(b.baslangic||''); });
    if(gp.length===0) return;
    html+='<p class="font-semi text-sm" style="margin:10px 0 6px;color:#4F46E5;">'+gun+'</p>';
    gp.forEach(function(plan){
      var ogr=getOgrenci(plan.ogrenciId);
      html+='<div class="item flex-between">';
      html+='<div><p class="font-semi">'+(ogr?ogr.ad:'?')+'</p>';
      html+='<p class="text-xs text-gray">'+plan.baslangic+' - '+plan.bitis+'</p>';
      if(state.showMoney&&ogr) html+='<p class="text-xs text-indigo">&#8378;'+ogr.ucret+'/ders</p>';
      html+='</div>';
      html+='<button class="btn btn-red btn-sm" onclick="programSil('+plan.id+')">Sil</button>';
      html+='</div>';
    });
  });
  return html;
}

function buildYoklamaTab(){
  var html='<div class="flex-between" style="margin-bottom:12px;">';
  html+='<p class="font-bold">Yoklama Gecmisi</p>';
  html+='<select onchange="state.yoklamaFiltre=this.value;render();" style="border:1.5px solid #e5e7eb;border-radius:8px;padding:4px 8px;font-size:12px;">';
  html+='<option value="">Tum Ogrenciler</option>';
  state.ogrenciler.forEach(function(o){
    html+='<option value="'+o.id+'"'+(state.yoklamaFiltre==o.id?' selected':'')+'>'+o.ad+'</option>';
  });
  html+='</select></div>';
  var list=state.yoklama.slice().reverse();
  if(state.yoklamaFiltre) list=list.filter(function(y){ return y.ogrenciId==state.yoklamaFiltre; });
  if(list.length===0) return html+'<div class="empty">Henuz yoklama yapilmamis</div>';
  list.forEach(function(y){
    var ogr=getOgrenci(y.ogrenciId);
    var plan=state.program.find(function(p){ return p.id===y.programId; });
    html+='<div class="item flex-between">';
    html+='<div><p class="font-semi text-sm">'+(ogr?ogr.ad:'?')+'</p>';
    html+='<p class="text-xs text-gray">'+y.tarih+(plan?' - '+plan.baslangic:'')+'</p>';
    if(y.durum==='geldi'&&state.showMoney) html+='<p class="text-xs text-green">&#8378;'+y.ucret+'</p>';
    html+='</div>';
    html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">';
    html+='<span class="ys ys-'+y.durum+'">'+(y.durum==='geldi'?'Geldi':y.durum==='gelmedi'?'Gelmedi':'Ertelendi')+'</span>';
    if(y.durum==='geldi') html+='<button class="btn btn-sm '+(y.odendi?'btn-green':'btn-yellow')+'" onclick="yokOde('+y.id+')">'+(y.odendi?'Odendi':'Bekliyor')+'</button>';
    html+='</div></div>';
  });
  return html;
}

function yokOde(id){
  state.yoklama=state.yoklama.map(function(y){ return y.id===id?Object.assign({},y,{odendi:!y.odendi}):y; });
  save('yoklama'); render();
}

function buildOgrencilerTab(){
  var html='<div class="flex-between" style="margin-bottom:12px;">';
  html+='<p class="font-bold">Ogrenciler ('+state.ogrenciler.length+')</p>';
  html+='<button class="btn btn-primary btn-sm" onclick="openOgrenciModal()">+ Yeni</button></div>';
  if(state.ogrenciler.length===0) return html+'<div class="empty">Henuz ogrenci eklenmemis</div>';
  state.ogrenciler.forEach(function(o){
    var geldi=state.yoklama.filter(function(y){ return y.ogrenciId==o.id&&y.durum==='geldi'; }).length;
    var topK=state.yoklama.filter(function(y){ return y.ogrenciId==o.id&&y.durum==='geldi'; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
    html+='<div class="item"><div class="flex-between">';
    html+='<div><p class="font-semi">'+o.ad+'</p>';
    html+='<p class="text-xs text-gray">'+o.telefon+'</p>';
    html+='<p class="text-xs text-gray">'+o.sinif+'. Sinif</p>';
    html+='<p class="text-xs text-indigo">'+(state.showMoney?o.ucret+' TL/ders':'...')+' &bull; '+geldi+' ders</p>';
    if(state.showMoney) html+='<p class="text-xs text-green">Toplam: &#8378;'+topK+'</p>';
    html+='</div>';
    html+='<div class="row-btns">';
    html+='<button class="btn btn-gray btn-sm" onclick="editOgrenci('+o.id+')">Duzenle</button>';
    html+='<button class="btn btn-red btn-sm" onclick="delOgrenci('+o.id+')">Sil</button>';
    html+='</div></div></div>';
  });
  return html;
}

function buildOdevlerTab(){
  var html='<div class="flex-between" style="margin-bottom:12px;">';
  html+='<p class="font-bold">Odevler ('+state.odevler.length+')</p>';
  html+='<button class="btn btn-primary btn-sm" onclick="openOdevModal()">+ Yeni</button></div>';
  if(state.odevler.length===0) return html+'<div class="empty">Henuz odev eklenmemis</div>';
  state.odevler.forEach(function(o){
    var rc=o.durum==='tamamlandi'?'#22c55e':o.durum==='eksik'?'#f59e0b':'#ef4444';
    var rt=o.durum==='tamamlandi'?'Tamamlandi':o.durum==='eksik'?'Eksik':'Yapilmadi';
    html+='<div class="item"><div class="flex-between"><div>';
    html+='<p class="font-semi text-sm">'+getOgrenciAd(o.ogrenciId)+'</p>';
    html+='<p class="text-sm">'+o.konu+'</p>';
    html+='<p class="text-xs" style="color:'+rc+';font-weight:600;">'+rt+'</p>';
    if(o.aciklama) html+='<p class="text-xs text-gray">'+o.aciklama+'</p>';
    html+='</div><div class="row-btns">';
    html+='<button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;" onclick="odevD('+o.id+',\'yapilmadi\')">X</button>';
    html+='<button class="btn btn-sm" style="background:#fef3c7;color:#d97706;" onclick="odevD('+o.id+',\'eksik\')">!</button>';
    html+='<button class="btn btn-sm" style="background:#dcfce7;color:#16a34a;" onclick="odevD('+o.id+',\'tamamlandi\')">V</button>';
    html+='<button class="btn btn-red btn-sm" onclick="delOdev('+o.id+')">Sil</button>';
    html+='</div></div></div>';
  });
  return html;
}

function buildDenemelerTab(){
  var html='<div class="flex-between" style="margin-bottom:12px;">';
  html+='<p class="font-bold">Deneme Takibi</p>';
  html+='<button class="btn btn-primary btn-sm" onclick="openDenemeModal()">+ Ekle</button></div>';
  if(state.denemeler.length===0) return html+'<div class="empty">Henuz deneme eklenmemis</div>';

  // Ogrenci bazli grupla
  var ogrs={};
  state.denemeler.forEach(function(d){
    if(!ogrs[d.ogrenciId]) ogrs[d.ogrenciId]=[];
    ogrs[d.ogrenciId].push(d);
  });

  Object.keys(ogrs).forEach(function(oid){
    var ogr=getOgrenci(oid);
    html+='<p class="font-semi" style="margin:10px 0 6px;color:#4F46E5;">'+(ogr?ogr.ad:'?')+'</p>';
    ogrs[oid].sort(function(a,b){ return a.tarih.localeCompare(b.tarih); }).forEach(function(d){
      html+='<div class="item">';
      html+='<div class="flex-between"><div>';
      html+='<p class="font-semi text-sm">'+d.ad+'</p>';
      html+='<p class="text-xs text-gray">'+d.tarih+'</p>';
      html+='<div style="display:flex;gap:8px;margin-top:4px;">';
      html+='<span class="text-xs" style="background:#ede9fe;color:#6d28d9;padding:2px 6px;border-radius:6px;">TYT: '+d.tyt+'</span>';
      html+='<span class="text-xs" style="background:#dbeafe;color:#1d4ed8;padding:2px 6px;border-radius:6px;">AYT: '+d.ayt+'</span>';
      if(d.not) html+='<span class="text-xs text-gray">'+d.not+'</span>';
      html+='</div></div>';
      html+='<button class="btn btn-red btn-sm" onclick="delDeneme('+d.id+')">Sil</button>';
      html+='</div></div>';
    });
  });
  return html;
}

// Actions
function setTab(t){ state.activeTab=t; render(); }
function toggleMoney(){ state.showMoney=!state.showMoney; render(); }
function programSil(id){ if(!confirm('Silinsin mi?')) return; state.program=state.program.filter(function(p){ return p.id!==id; }); save('program'); render(); }
function delOgrenci(id){ if(!confirm('Silinsin mi?')) return; state.ogrenciler=state.ogrenciler.filter(function(o){ return o.id!==id; }); save('ogrenciler'); render(); }
function odevD(id,d){ state.odevler=state.odevler.map(function(o){ return o.id===id?Object.assign({},o,{durum:d}):o; }); save('odevler'); render(); }
function delOdev(id){ if(!confirm('Silinsin mi?')) return; state.odevler=state.odevler.filter(function(o){ return o.id!==id; }); save('odevler'); render(); }
function delDeneme(id){ if(!confirm('Silinsin mi?')) return; state.denemeler=state.denemeler.filter(function(d){ return d.id!==id; }); save('denemeler'); render(); }

function sendTomorrowReminders(){
  var yarin=tomorrowStr();
  var yarinGun=gunAdiTR(yarin);
  var list=state.program.filter(function(p){ return p.gun===yarinGun; });
  if(list.length===0){ toast('Yarin ders yok','#f59e0b'); return; }
  list.forEach(function(plan){
    var ogr=getOgrenci(plan.ogrenciId);
    if(ogr&&ogr.telefon) sendWhatsApp(ogr.telefon,'Merhaba, yarin saat '+plan.baslangic+' daki dersimiz icin hatirlatma.');
  });
  toast(list.length+' hatirlatma gonderildi','#22c55e');
}

// Modal - Program
function openProgramModal(){
  if(!canAdd('program')){ openUpgrade(); return; }
  if(state.ogrenciler.length===0){ toast('Once ogrenci ekleyin!','#f59e0b'); return; }
  var saatler=[];
  for(var i=7;i<=22;i++){ saatler.push(pad(i)+':00'); saatler.push(pad(i)+':30'); }

  var html='<div class="modal-bg" id="pmBg"><div class="modal">';
  html+='<div class="flex-between" style="margin-bottom:16px;"><h3>Yeni Program</h3>';
  html+='<button onclick="closeModal(\'pmBg\')" style="background:none;border:none;font-size:24px;cursor:pointer;">x</button></div>';
  html+='<div class="form-group"><label>Ogrenci *</label><select id="pmO"><option value="">Secin</option>';
  state.ogrenciler.forEach(function(o){ html+='<option value="'+o.id+'">'+o.ad+'</option>'; });
  html+='</select></div>';
  html+='<div class="form-group"><label>Gun *</label><select id="pmG"><option value="">Secin</option>';
  ['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'].forEach(function(g){ html+='<option>'+g+'</option>'; });
  html+='</select></div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:12px;">';
  html+='<div style="flex:1"><label class="text-xs font-semi" style="display:block;margin-bottom:4px;">Baslangic</label>';
  html+='<select id="pmBas" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"><option value="">Sec</option>';
  saatler.forEach(function(s){ html+='<option>'+s+'</option>'; });
  html+='</select></div>';
  html+='<div style="flex:1"><label class="text-xs font-semi" style="display:block;margin-bottom:4px;">Bitis</label>';
  html+='<select id="pmBit" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"><option value="">Sec</option>';
  saatler.forEach(function(s){ html+='<option>'+s+'</option>'; });
  html+='</select></div></div>';
  html+='<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;" onclick="saveProgram()">Kaydet</button>';
  html+='<button class="btn btn-gray" style="flex:1;" onclick="closeModal(\'pmBg\')">Iptal</button></div>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}

function saveProgram(){
  var o=document.getElementById('pmO').value;
  var g=document.getElementById('pmG').value;
  var bas=document.getElementById('pmBas').value;
  var bit=document.getElementById('pmBit').value;
  if(!o||!g||!bas||!bit){ toast('Tum alanlari doldurun','#f59e0b'); return; }
  if(bas>=bit){ toast('Bitis baslangictan once!','#ef4444'); return; }
  state.program.push({id:Date.now(),ogrenciId:Number(o),gun:g,baslangic:bas,bitis:bit});
  save('program'); closeModal('pmBg'); toast('Program eklendi!','#22c55e'); render();
}

// Modal - Ogrenci
var editOgrId=null;
function openOgrenciModal(){ editOgrId=null; showOgrModal({ad:'',telefon:'',sinif:'',ucret:''}); }
function editOgrenci(id){ var o=state.ogrenciler.find(function(x){ return x.id===id; }); if(o){ editOgrId=id; showOgrModal(o); } }
function showOgrModal(d){
  var html='<div class="modal-bg" id="omBg"><div class="modal">';
  html+='<div class="flex-between" style="margin-bottom:16px;"><h3>'+(editOgrId?'Duzenle':'Yeni Ogrenci')+'</h3>';
  html+='<button onclick="closeModal(\'omBg\')" style="background:none;border:none;font-size:24px;cursor:pointer;">x</button></div>';
  html+='<div class="form-group"><label>Ad Soyad *</label><input id="oAd" value="'+d.ad+'" placeholder="Ahmet Yilmaz"></div>';
  html+='<div class="form-group"><label>Telefon</label><input id="oTel" type="tel" value="'+(d.telefon||'')+'" placeholder="0555 123 4567"></div>';
  html+='<div class="form-group"><label>Sinif</label><input id="oSinif" value="'+(d.sinif||'')+'" placeholder="10"></div>';
  html+='<div class="form-group"><label>Ders Ucreti (TL)</label><input id="oUcret" type="number" value="'+(d.ucret||'')+'" placeholder="500"></div>';
  html+='<div style="display:flex;gap:8px;"><button class="btn btn-primary" style="flex:1;" onclick="saveOgr()">Kaydet</button>';
  html+='<button class="btn btn-gray" style="flex:1;" onclick="closeModal(\'omBg\')">Iptal</button></div>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}
function saveOgr(){
  var ad=document.getElementById('oAd').value.trim();
  if(!ad){ toast('Ad girin!','#f59e0b'); return; }
  if(!canAdd('student')&&!editOgrId){ openUpgrade(); return; }
  var obj={ad:ad,telefon:document.getElementById('oTel').value,sinif:document.getElementById('oSinif').value,ucret:document.getElementById('oUcret').value};
  if(editOgrId){
    state.ogrenciler=state.ogrenciler.map(function(o){ return o.id===editOgrId?Object.assign({},obj,{id:editOgrId}):o; });
  } else { obj.id=Date.now(); state.ogrenciler.push(obj); }
  save('ogrenciler'); closeModal('omBg'); render();
}

// Modal - Odev
function openOdevModal(){
  if(state.ogrenciler.length===0){ toast('Once ogrenci ekleyin!','#f59e0b'); return; }
  var html='<div class="modal-bg" id="odvBg"><div class="modal">';
  html+='<div class="flex-between" style="margin-bottom:16px;"><h3>Yeni Odev</h3>';
  html+='<button onclick="closeModal(\'odvBg\')" style="background:none;border:none;font-size:24px;cursor:pointer;">x</button></div>';

  html+='</select></div>';

  html+='</div></div>';

function saveOdev(){
  var oid=document.getElementById('ovO').value;
  var k=document.getElementById('ovK').value.trim();
  if(!oid||!k){ toast('Ogrenci ve konu zorunlu!','#f59e0b'); return; }

}

// Modal - Deneme

  var html='<div class="modal-bg" id="dnBg"><div class="modal">';

  html+='<div style="flex:1"><label class="text-xs font-semi" style="display:block;margin-bottom:4px;">AYT Net</label>';
  html+='<input id="dnAyt" type="number" step="0.5" placeholder="60.0" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"></div></div>';
  html+='<div class="form-group"><label>Not</label><input id="dnNot" placeholder="Matematik dusuk"></div>';

  html+='<button class="btn btn-gray" style="flex:1;" onclick="closeModal(\'dnBg\')">Iptal</button></div>';
  html+='</div></div>';

function saveDeneme(){
  var oid=document.getElementById('dnO').value;
  var ad=document.getElementById('dnAd').value.trim();
  if(!oid||!ad){ toast('Ogrenci ve deneme adi zorunlu!','#f59e0b'); return; }

  save('denemeler'); closeModal('dnBg'); toast('Deneme eklendi!','#22c55e'); render();

function closeModal(id){ var el=document.getElementById(id); if(el) el.remove(); }
function openUpgrade(){
  var html='<div class="modal-bg" id="upBg"><div class="modal" style="text-align:center;">';
  html+='<h3>Limit Doldu</h3><p style="color:#6b7280;margin:12px 0;">Premium ile sinirsiz kullanin!</p>';
  html+='<button class="btn btn-primary" style="width:100%;margin-bottom:8px;" onclick="activatePremium()">Premium Ac</button>';
  html+='<button class="btn btn-gray" style="width:100%;" onclick="closeModal(\'upBg\')">Vazgec</button>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}
function activatePremium(){ state.isPremium=true; save('isPremium'); closeModal('upBg'); toast('Premium aktif!','#6d28d9'); render(); }

load();
if(!state.yoklamaFiltre) state.yoklamaFiltre='';
render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/derspaneli/service-worker.js')
    .catch(function(e){ console.error('SW:',e); });
}
