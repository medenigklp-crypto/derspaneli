<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4F46E5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Ders Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,sans-serif;background:#EEF2FF;min-height:100vh;padding-bottom:80px;}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:16px;margin:0 12px 12px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}
.st{border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden;}
.st p{font-size:11px;opacity:.85;}
.st h2{font-size:22px;font-weight:bold;}
.s1{background:linear-gradient(135deg,#6366f1,#4338ca);}
.s2{background:linear-gradient(135deg,#22c55e,#15803d);}
.s3{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.s4{background:linear-gradient(135deg,#ef4444,#b91c1c);}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
.bp{background:#4F46E5;color:#fff;}
.bd{background:#1f2937;color:#fff;}
.bg{background:#22c55e;color:#fff;}
.bgy{background:#e5e7eb;color:#374151;}
.br{background:#ef4444;color:#fff;}
.by{background:#f59e0b;color:#fff;}
.bo{background:#f97316;color:#fff;}
.bsm{padding:6px 10px;font-size:11px;border-radius:8px;}
.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;gap:2px;margin:0 12px 12px;overflow-x:auto;}
.tab{flex:1;min-width:50px;padding:8px 2px;border:none;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;background:transparent;color:#6b7280;}
.tab.active{background:#4F46E5;color:#fff;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:bold;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;}
.it{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:8px;background:#fff;}
.it.geldi{border-color:#86efac;background:#f0fdf4;}
.it.gelmedi{border-color:#fca5a5;background:#fff1f2;}
.it.ertelendi{border-color:#fcd34d;background:#fffbeb;}
.fb{display:flex;align-items:center;justify-content:space-between;}
.tsm{font-size:13px;}
.txs{font-size:11px;}
.tgr{color:#6b7280;}
.tin{color:#4F46E5;}
.tgn{color:#16a34a;}
.trd{color:#dc2626;}
.fbold{font-weight:700;}
.fsemi{font-weight:600;}
.rbtn{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.empty{text-align:center;padding:32px;color:#9ca3af;font-size:14px;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;z-index:200;pointer-events:none;}
.hdr{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
.hdr h1{font-size:20px;font-weight:bold;color:#4F46E5;}
.hdr p{font-size:11px;color:#6b7280;}
.bdg{font-size:11px;padding:4px 8px;border-radius:8px;font-weight:600;}
.bdgf{background:#f3f4f6;color:#374151;}
.bdgp{background:#ede9fe;color:#6d28d9;}
.qb{display:flex;gap:8px;padding:0 12px 12px;flex-wrap:wrap;}
.qb .btn{flex:1;min-width:80px;font-size:12px;}
.ys{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.ysg{background:#dcfce7;color:#15803d;}
.ysn{background:#fee2e2;color:#dc2626;}
.yse{background:#fef3c7;color:#d97706;}
.ysb{background:#f3f4f6;color:#6b7280;}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cdn{font-size:10px;color:#6b7280;font-weight:600;padding:4px 0;}
.cd{font-size:12px;padding:5px 2px;border-radius:8px;cursor:pointer;min-height:30px;}
.cd.today{background:#4F46E5;color:#fff;font-weight:700;}
.dot{width:6px;height:6px;border-radius:50%;background:#ef4444;margin:0 auto;margin-top:1px;}
.dot.y{background:#22c55e;}
.og{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.oi{background:#f9fafb;border-radius:10px;padding:8px;text-align:center;}
.oi h3{font-size:20px;font-weight:bold;}
.oi p{font-size:10px;color:#6b7280;}
.oc{border:1.5px solid #e5e7eb;border-radius:16px;margin-bottom:12px;overflow:hidden;}
.och{padding:12px;background:#fff;cursor:pointer;}
.ocb{padding:12px;background:#f9fafb;border-top:1px solid #e5e7eb;}
.br2{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e5e7eb;}
.br2:last-child{border-bottom:none;}
.ptab{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;gap:3px;margin-bottom:12px;}
.ptab button{flex:1;padding:6px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th,td{border:1px solid #e5e7eb;padding:5px 3px;text-align:center;}
th{background:#f9fafb;font-weight:600;}
.tdhl{background:#eef2ff;font-weight:700;cursor:pointer;}
.tdto{background:#e0e7ff;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var S={
  ogrenciler:[],program:[],yoklama:[],odevler:[],denemeler:[],
  isPremium:false,showMoney:true,activeTab:'bugun',
  calAy:new Date().getMonth(),calYil:new Date().getFullYear(),
  calSeciliGun:null,yoklamaFiltre:'',acikOgrenci:null,
  programGorunum:'liste',
  LIMITS:{student:5,program:30}
};

function load(){
  ['ogrenciler','program','yoklama','odevler','denemeler','isPremium'].forEach(function(k){
    try{ var v=localStorage.getItem('dp_'+k); if(v) S[k]=JSON.parse(v); }catch(e){}
  });
}
function save(k){ try{ localStorage.setItem('dp_'+k,JSON.stringify(S[k])); }catch(e){} }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function tomorrowStr(){
  var d=new Date(); d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function gunAdi(tarih){
  return ['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'][new Date(tarih).getDay()];
}
function getOgr(id){ return S.ogrenciler.find(function(o){ return o.id==id; }); }
function canAdd(t){
  if(S.isPremium) return true;
  if(t==='student') return S.ogrenciler.length<S.LIMITS.student;
  if(t==='program') return S.program.length<S.LIMITS.program;
  return true;
}
function sendWA(tel,msg){
  if(!tel){ toast('Telefon yok!','#f59e0b'); return; }
  var t=tel.replace(/\D/g,'');
  if(!t.startsWith('90')) t=t.startsWith('0')?'90'+t.slice(1):'90'+t;
  window.open('https://wa.me/'+t+'?text='+encodeURIComponent(msg),'_blank');
}
function waBtnClick(el){
  var tel=el.getAttribute('data-tel');
  var saat=el.getAttribute('data-saat');
  sendWA(tel,'Merhaba, bugun saat '+saat+' daki ders icin hatirlatma.');
}
function waTomorrow(el){
  var tel=el.getAttribute('data-tel');
  var saat=el.getAttribute('data-saat');
  sendWA(tel,'Merhaba, yarin saat '+saat+' daki ders icin hatirlatma.');
}
function toast(msg,color){
  var el=document.createElement('div');
  el.className='toast'; el.style.background=color||'#1f2937'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); },2500);
}
function dsSaati(bas,bit){
  if(!bas||!bit) return 1;
  var b=bas.split(':'), e=bit.split(':');
  var dk=(Number(e[0])*60+Number(e[1]))-(Number(b[0])*60+Number(b[1]));
  if(dk<=0) return 1;
  return Math.ceil(dk/45);
}
function ucret(plan,ogr){
  if(!ogr) return 0;
  return dsSaati(plan.baslangic,plan.bitis)*Number(ogr.ucret||0);
}
function bugunProgram(){
  var g=gunAdi(todayStr());
  return S.program.filter(function(p){ return p.gun===g; })
    .sort(function(a,b){ return (a.baslangic||'').localeCompare(b.baslangic||''); });
}
function getYok(pid,tarih){
  return S.yoklama.find(function(y){ return y.programId===pid&&y.tarih===tarih; });
}
function yokKaydet(pid,durum){
  var tarih=todayStr();
  var plan=S.program.find(function(p){ return p.id===pid; });
  var ogr=plan?getOgr(plan.ogrenciId):null;
  var ucr=(durum==='geldi'&&plan&&ogr)?ucret(plan,ogr):0;
  var mev=getYok(pid,tarih);
  if(mev){
    S.yoklama=S.yoklama.map(function(y){
      return(y.programId===pid&&y.tarih===tarih)?Object.assign({},y,{durum:durum,ucret:ucr}):y;
    });
  } else {
    S.yoklama.push({id:Date.now(),programId:pid,tarih:tarih,durum:durum,ogrenciId:plan?plan.ogrenciId:null,ucret:ucr,odendi:false});
  }
  save('yoklama');
  var c={geldi:'#22c55e',gelmedi:'#ef4444',ertelendi:'#f59e0b'};
  toast(durum==='geldi'?'Geldi!':durum==='gelmedi'?'Gelmedi!':'Ertelendi!',c[durum]);
  render();
}
function render(){ document.getElementById('app').innerHTML=buildApp(); }

function buildApp(){
  var bugun=todayStr();
  var bp=bugunProgram();
  var bgld=bp.filter(function(p){ var y=getYok(p.id,bugun); return y&&y.durum==='geldi'; }).length;
  var topK=S.yoklama.filter(function(y){ return y.durum==='geldi'; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
  var bK=S.yoklama.filter(function(y){ return y.durum==='geldi'&&y.tarih===bugun; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
  var bek=S.yoklama.filter(function(y){ return y.durum==='geldi'&&!y.odendi; }).reduce(function(s,y){ return s+Number(y.ucret||0); },0);
  var sm=S.showMoney;
  var html='';
  html+='<div class="hdr"><div><h1>Ders Paneli</h1><p>'+new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'})+'</p></div>';
  html+='<span class="bdg '+(S.isPremium?'bdgp':'bdgf')+'">'+(S.isPremium?'Premium':'Ucretsiz')+'</span></div>';
  html+='<div class="sg">';
  html+='<div class="st s1"><p>Bugun</p><h2>'+bp.length+'</h2><p>'+bgld+' geldi</p></div>';
  html+='<div class="st s2"><p>Toplam</p><h2>'+(sm?'&#8378;'+topK.toFixed(0):'...')+'</h2><p>kazanc</p></div>';
  html+='<div class="st s3"><p>Bugun</p><h2>'+(sm?'&#8378;'+bK.toFixed(0):'...')+'</h2><p>kazanildi</p></div>';
  html+='<div class="st s4"><button onclick="toggleMoney()" style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;font-size:14px;color:#fff;">'+(sm?'&#128065;':'&#128584;')+'</button><p>Bekleyen</p><h2>'+(sm?'&#8378;'+bek.toFixed(0):'...')+'</h2><p>odeme</p></div>';
  html+='</div>';
  html+='<div class="qb">';
  html+='<button class="btn bp" onclick="setTab(\'program\')">Program</button>';
  html+='<button class="btn bd" onclick="openOgrModal()">+ Ogrenci</button>';
  html+='<button class="btn bg" onclick="sendTomorrow()">Hatirlatma</button>';
  html+='</div>';
  html+='<div class="tabs">';
  [['bugun','Bugun'],['takvim','Takvim'],['program','Program'],['yoklama','Yoklama'],['ogrenciler','Ogrenciler'],['odevler','Odevler'],['denemeler','Denemeler']].forEach(function(t){
    html+='<button class="tab'+(S.activeTab===t[0]?' active':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';
  });
  html+='</div>';
  html+='<div class="card">';
  if(S.activeTab==='bugun') html+=tabBugun();
  else if(S.activeTab==='takvim') html+=tabTakvim();
  else if(S.activeTab==='program') html+=tabProgram();
  else if(S.activeTab==='yoklama') html+=tabYoklama();
  else if(S.activeTab==='ogrenciler') html+=tabOgrenciler();
  else if(S.activeTab==='odevler') html+=tabOdevler();
  else if(S.activeTab==='denemeler') html+=tabDenemeler();
  html+='</div>';
  return html;
}

function tabBugun(){
  var bugun=todayStr();
  var bp=bugunProgram();
  var html='<p class="fbold" style="margin-bottom:12px;">Bugunun Dersleri</p>';
  if(bp.length===0) return html+'<div class="empty">Bugun ders yok</div>';
  bp.forEach(function(plan){
    var ogr=getOgr(plan.ogrenciId);
    var y=getYok(plan.id,bugun);
    var dur=y?y.durum:'bekliyor';
    var ds=dsSaati(plan.baslangic,plan.bitis);
    var ucr=ucret(plan,ogr);
    html+='<div class="it'+(dur!=='bekliyor'?' '+dur:'')+'">';
    html+='<div class="fb" style="margin-bottom:8px;">';
    html+='<div><p class="fsemi">'+(ogr?ogr.ad:'?')+'</p>';
    html+='<p class="txs tgr">'+plan.baslangic+' - '+plan.bitis+' ('+ds+' ders saati)</p>';
    if(sm) html+='<p class="txs tin fsemi">&#8378;'+ucr+'</p>';
    html+='</div>';
    var yc='ys '+(dur==='geldi'?'ysg':dur==='gelmedi'?'ysn':dur==='ertelendi'?'yse':'ysb');
    var yt=dur==='geldi'?'Geldi':dur==='gelmedi'?'Gelmedi':dur==='ertelendi'?'Ertelendi':'Bekliyor';
    html+='<span class="'+yc+'">'+yt+'</span></div>';
    html+='<div class="rbtn">';
    html+='<button class="btn bg bsm" onclick="yokKaydet('+plan.id+',\'geldi\')">Geldi</button>';
    html+='<button class="btn br bsm" onclick="yokKaydet('+plan.id+',\'gelmedi\')">Gelmedi</button>';
    html+='<button class="btn bo bsm" onclick="yokKaydet('+plan.id+',\'ertelendi\')">Ertelendi</button>';
    if(ogr&&ogr.telefon) html+='<button class="btn bsm" style="background:#dcfce7;color:#15803d;" data-tel="'+ogr.telefon+'" data-saat="'+plan.baslangic+'" onclick="waBtnClick(this)">WA</button>';
    html+='</div></div>';
  });
  return html;
}

function tabTakvim(){
  var ay=S.calAy,yil=S.calYil;
  var ayAd=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var bugun=todayStr();
  var simdi=new Date();
  var hb=new Date(simdi);
  var gn=simdi.getDay(); hb.setDate(simdi.getDate()+(gn===0?-6:1-gn));
  var he=new Date(hb); he.setDate(hb.getDate()+6);
  var hbS=hb.getFullYear()+'-'+pad(hb.getMonth()+1)+'-'+pad(hb.getDate());
  var heS=he.getFullYear()+'-'+pad(he.getMonth()+1)+'-'+pad(he.getDate());
  var gunler=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  var hTop=0;
  for(var gi=0;gi<7;gi++){
    hTop+=S.program.filter(function(p){ return p.gun===gunler[gi]; }).length;
  }
  var hYap=S.yoklama.filter(function(y){ return y.tarih>=hbS&&y.tarih<=heS&&y.durum==='geldi'; }).length;
  var hIpt=S.yoklama.filter(function(y){ return y.tarih>=hbS&&y.tarih<=heS&&y.durum==='gelmedi'; }).length;
  var hKal=Math.max(0,hTop-hYap-hIpt);
  var html='';
  html+='<p class="txs tgr fsemi" style="margin-bottom:6px;">Bu Hafta ('+hbS.slice(5)+' - '+heS.slice(5)+')</p>';
  html+='<div class="og">';
  html+='<div class="oi"><h3 style="color:#4F46E5;">'+hTop+'</h3><p>Toplam</p></div>';
  html+='<div class="oi"><h3 style="color:#22c55e;">'+hYap+'</h3><p>Yapilan</p></div>';
  html+='<div class="oi"><h3 style="color:#ef4444;">'+hIpt+'</h3><p>Iptal</p></div>';
  html+='<div class="oi"><h3 style="color:#f59e0b;">'+hKal+'</h3><p>Kalan</p></div>';
  html+='</div>';
  html+='<div class="ch">';
  html+='<button class="btn bgy bsm" onclick="calNav(-1)">&#8592;</button>';
  html+='<span class="fbold">'+ayAd[ay]+' '+yil+'</span>';
  html+='<button class="btn bgy bsm" onclick="calNav(1)">&#8594;</button>';
  html+='</div>';
  html+='<div class="cg">';
  ['Pzt','Sal','Car','Per','Cum','Cmt','Paz'].forEach(function(g){ html+='<div class="cdn">'+g+'</div>'; });
  var ilk=new Date(yil,ay,1).getDay();
  var off=ilk===0?6:ilk-1;
  var son=new Date(yil,ay+1,0).getDate();
  for(var i=0;i<off;i++) html+='<div></div>';
  for(var d=1;d<=son;d++){
    var tar=yil+'-'+pad(ay+1)+'-'+pad(d);
    var gAd=gunAdi(tar);
    var dS=S.program.filter(function(p){ return p.gun===gAd; }).length;
    var gS=S.yoklama.filter(function(y){ return y.tarih===tar&&y.durum==='geldi'; }).length;
    var isTd=tar===bugun;
    var isSel=S.calSeciliGun===tar;
    html+='<div class="cd'+(isTd?' today':'')+(dS>0?' has-lesson':'')+'" onclick="calGun(\''+tar+'\')" style="'+(isSel&&!isTd?'background:#e0e7ff;':'')+'">'+d;
    if(dS>0) html+='<div class="dot'+(gS>0?' y':'')+'"></div>';
    html+='</div>';
  }
  html+='</div>';
  if(S.calSeciliGun){
    var sg=S.calSeciliGun;
    var sgAd=gunAdi(sg);
    var sgP=S.program.filter(function(p){ return p.gun===sgAd; })
      .sort(function(a,b){ return (a.baslangic||'').localeCompare(b.baslangic||''); });
    html+='<p class="fsemi" style="margin:12px 0 6px;">'+sg+' Dersleri</p>';
    if(sgP.length===0){ html+='<p class="txs tgr">Bu gun ders yok</p>'; }
    else sgP.forEach(function(plan){
      var ogr=getOgr(plan.ogrenciId);
      var y2=getYok(plan.id,sg);
      var d2=y2?y2.durum:'bekliyor';
      var ds=dsSaati(plan.baslangic,plan.bitis);
      html+='<div class="it fb" style="padding:8px 12px;">';
      html+='<div><p class="fsemi tsm">'+(ogr?ogr.ad:'?')+'</p>';
      html+='<p class="txs tgr">'+plan.baslangic+'-'+plan.bitis+' ('+ds+' saat)</p></div>';
      var yc2='ys '+(d2==='geldi'?'ysg':d2==='gelmedi'?'ysn':d2==='ertelendi'?'yse':'ysb');
      html+='<span class="'+yc2+'">'+(d2==='geldi'?'Geldi':d2==='gelmedi'?'Gelmedi':d2==='ertelendi'?'Ertelendi':'Bekliyor')+'</span>';
      html+='</div>';
    });
  }
  return html;
}

function tabProgram(){
  var g=S.programGorunum||'liste';
  var html='<div class="fb" style="margin-bottom:12px;">';
  html+='<p class="fbold">Haftalik Program</p>';
  html+='<button class="btn bp bsm" onclick="openProgramModal()">+ Ekle</button></div>';
  html+='<div class="ptab">';
  html+='<button onclick="S.programGorunum=\'liste\';render();" style="'+(g==='liste'?'background:#4F46E5;color:#fff;':'background:transparent;color:#6b7280;')+'">Liste</button>';
  html+='<button onclick="S.programGorunum=\'tablo\';render();" style="'+(g==='tablo'?'background:#4F46E5;color:#fff;':'background:transparent;color:#6b7280;')+'">Haftalik Tablo</button>';
  html+='</div>';
  if(S.program.length===0) return html+'<div class="empty">Henuz program yok</div>';
  if(g==='tablo') return html+programTablo();
  return html+programListe();
}

function programListe(){
  var gunler=['Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi','Pazar'];
  var html='';
  gunler.forEach(function(gun){
    var gp=S.program.filter(function(p){ return p.gun===gun; })
      .sort(function(a,b){ return (a.baslangic||'').localeCompare(b.baslangic||''); });
    if(gp.length===0) return;
    html+='<p class="fsemi tsm" style="margin:10px 0 6px;color:#4F46E5;">'+gun+'</p>';
    gp.forEach(function(plan){
      var ogr=getOgr(plan.ogrenciId);

function programTablo(){

  html+='</tr></thead><tbody>';

function saveProgram(){
  var o=document.getElementById('pmO').value;
  var g=document.getElementById('pmG').value;
  var bas=document.getElementById('pmBas').value;
  var bit=document.getElementById('pmBit').value;
  if(!o||!g||!bas||!bit){ toast('Tum alanlari doldurun','#f59e0b'); return; }
  if(bas>=bit){ toast('Bitis baslangictan once!','#ef4444'); return; }
  var ogr=getOgr(Number(o));
  var ds=dsSaati(bas,bit);
  var ucr=ds*Number(ogr?ogr.ucret||0:0);
  S.program.push({id:Date.now(),ogrenciId:Number(o),gun:g,baslangic:bas,bitis:bit});
  save('program');
  closeModal('pmBg');
  toast(ds+' ders saati = &#8378;'+ucr,'#22c55e');
  render();
}

  html+='<input id="dnTyt" type="number" step="0.5" placeholder="85.5" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"></div>';
  html+='<div style="flex:1"><label class="txs fsemi" style="display:block;margin-bottom:4px;">AYT Net</label>';
  html+='<input id="dnAyt" type="number" step="0.5" placeholder="60.0" style="width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px;font-size:13px;"></div></div>';
  html+='<div class="fg"><label>Not</label><input id="dnNot" placeholder="Matematik dusuk"></div>';
  html+='<div style="display:flex;gap:8px;">';
  html+='<button class="btn bp" style="flex:1;" onclick="saveDeneme()">Ekle</button>';
  html+='<button class="btn bgy" style="flex:1;" onclick="closeModal(\'dnBg\')">Iptal</button></div>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}
function saveDeneme(){
  var oid=document.getElementById('dnO').value;
  var ad=document.getElementById('dnAd').value.trim();
  if(!oid||!ad){ toast('Ogrenci ve deneme adi zorunlu!','#f59e0b'); return; }
  S.denemeler.push({id:Date.now(),ogrenciId:Number(oid),ad:ad,tarih:document.getElementById('dnTar').value,tyt:document.getElementById('dnTyt').value||'-',ayt:document.getElementById('dnAyt').value||'-',not:document.getElementById('dnNot').value});
  save('denemeler'); closeModal('dnBg'); toast('Deneme eklendi!','#22c55e'); render();
}

function closeModal(id){ var el=document.getElementById(id); if(el) el.remove(); }
function openUpgrade(){
  var html='<div class="mbg" id="upBg"><div class="modal" style="text-align:center;">';
  html+='<h3>Limit Doldu</h3><p style="color:#6b7280;margin:12px 0;">Premium ile sinirsiz kullanin!</p>';
  html+='<button class="btn bp" style="width:100%;margin-bottom:8px;" onclick="activatePremium()">Premium Ac</button>';
  html+='<button class="btn bgy" style="width:100%;" onclick="closeModal(\'upBg\')">Vazgec</button>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}
function activatePremium(){ S.isPremium=true; save('isPremium'); closeModal('upBg'); toast('Premium aktif!','#6d28d9'); render(); }

load();
if(!S.yoklamaFiltre) S.yoklamaFiltre='';
render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/derspaneli/service-worker.js').catch(function(e){ console.log(e); });
}
