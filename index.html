<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="manifest.json">
    <title>📚 Ders Paneli</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="apple-touch-icon" href="icon-180.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior: none; touch-action: pan-x pan-y; }
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        }
        #splash {
            position: fixed; width: 100%; height: 100%; background: #4B2EFF; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 28px;
            font-weight: bold; z-index: 9999;
        }
        .fade-out { opacity: 0; transition: 0.6s; }
    </style>
</head>
<body>

<div id="splash">
  <h1>DERS PANELİ</h1>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ name, size = 20, className = "" }) => {
        const icons = {
            users: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            calendar: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            book: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
            dollar: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>,
            plus: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            x: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            edit: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            trash: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        };
        return icons[name] || null;
    };
    
    const DersPanel = () => {
        const normalizeDate = (date) => {
            if (!date) return null;
            const d = new Date(date);
            if (isNaN(d.getTime())) return null;
            return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
        };

        const [ogrenciler, setOgrenciler] = useState([]);
        const [odevler, setOdevler] = useState([]);
        const [dersler, setDersler] = useState([]);
        const [dersProgrami, setDersProgrami] = useState([]);
        const [isPremium, setIsPremium] = useState(false);
        const [activeTab, setActiveTab] = useState('program');
        const [showMoney, setShowMoney] = useState(true);
        const [showOgrenciModal, setShowOgrenciModal] = useState(false);
        const [showDersModal, setShowDersModal] = useState(false);
        const [showOdevModal, setShowOdevModal] = useState(false);
        const [showOdevSoru, setShowOdevSoru] = useState(false);
        const [seciliOgrenci, setSeciliOgrenci] = useState("tum");
        const [showUpgrade, setShowUpgrade] = useState(false);
        const [showHatirlatPopup, setShowHatirlatPopup] = useState(false);
        const [hatirlatmaListesi, setHatirlatmaListesi] = useState([]);
        const [tekrarEt, setTekrarEt] = useState(false);
        const [editId, setEditId] = useState(null);
        const [editingId, setEditingId] = useState(null);

        const [ogrenciForm, setOgrenciForm] = useState({ ad: '', telefon: '', sinif: '', ucret: '' });
        const [odevForm, setOdevForm] = useState({ ogrenciId: '', konu: '', aciklama: '', durum: "yapilmadi" });
        const [programForm, setProgramForm] = useState({ ogrenciId: "", gun: "", basSaat: "", basDakika: "", bitSaat: "", bitDakika: "" });
        const [seciliTarih, setSeciliTarih] = useState(() => new Date().toISOString().split("T")[0]);

        const bugunStr = normalizeDate(new Date());
        const LIMITS = { student: 5, homework: 10, program: 5, lesson: 5 };

        const [popup, setPopup] = useState({ show: false, message: "", type: "info" });

        const showPopup = (message, type = "info") => {
            setPopup({ show: true, message, type });
            setTimeout(() => setPopup({ show: false, message: "", type: "info" }), 2000);
        };

        const canAdd = (type) => {
            if (isPremium) return true;
            if (type === "student") return ogrenciler.length < LIMITS.student;
            if (type === "homework") return odevler.length < LIMITS.homework;
            if (type === "program") return dersProgrami.length < LIMITS.program;
            return true;
        };

        useEffect(() => {
            try {
                setDersProgrami(JSON.parse(localStorage.getItem("dersProgrami") || "[]"));
                setOgrenciler(JSON.parse(localStorage.getItem("ogrenciler") || "[]"));
                setOdevler(JSON.parse(localStorage.getItem("odevler") || "[]"));
                setDersler(JSON.parse(localStorage.getItem("dersler") || "[]"));
            } catch(e) { console.error(e); }
        }, []);

        useEffect(() => { localStorage.setItem("dersProgrami", JSON.stringify(dersProgrami)); }, [dersProgrami]);
        useEffect(() => { localStorage.setItem("ogrenciler", JSON.stringify(ogrenciler)); }, [ogrenciler]);
        useEffect(() => { localStorage.setItem("odevler", JSON.stringify(odevler)); }, [odevler]);
        useEffect(() => { localStorage.setItem("dersler", JSON.stringify(dersler)); }, [dersler]);

        const getOgrenciAd = (id) => {
            const ogrenci = ogrenciler.find(o => o.id === parseInt(id));
            return ogrenci ? ogrenci.ad : 'Bilinmeyen';
        };

        const sendWhatsApp = (telefon, mesaj) => {
            if (!telefon) return;
            let temiz = telefon.replace(/\D/g, "");
            if (temiz.startsWith("0")) temiz = "90" + temiz.substring(1);
            else if (!temiz.startsWith("90")) temiz = "90" + temiz;
            window.open(`https://wa.me/${temiz}?text=${encodeURIComponent(mesaj)}`, "_blank");
        };

        const ogrenciKaydet = () => {
            if (!ogrenciForm.ad) return;
            if (!editingId && !canAdd("student")) { setShowUpgrade(true); return; }
            if (editingId) {
                setOgrenciler(ogrenciler.map(o => o.id === editingId ? { ...ogrenciForm, id: editingId } : o));
            } else {
                setOgrenciler([...ogrenciler, { ...ogrenciForm, id: Date.now() }]);
            }
            setShowOgrenciModal(false); setEditingId(null);
        };

        const ogrenciSil = (id) => { if(confirm('Silinsin mi?')) setOgrenciler(ogrenciler.filter(o => o.id !== id)); };
        const ogrenciDuzenle = (o) => { setOgrenciForm(o); setEditingId(o.id); setShowOgrenciModal(true); };

        const odevEkle = () => {
            if (!odevForm.konu) return;
            setOdevler([...odevler, { ...odevForm, id: Date.now() }]);
            setShowOdevModal(false);
        };

        const odevSil = (id) => { setOdevler(odevler.filter(o => o.id !== id)); };
        const odevDurumDegistir = (id, d) => { setOdevler(odevler.map(o => o.id === id ? {...o, durum: d} : o)); };

        const dersGerceklesti = (plan) => {
            setDersler([...dersler, { ...plan, id: Date.now(), odendi: false, ucret: ogrenciler.find(o=>o.id===plan.ogrenciId)?.ucret || 0 }]);
            setDersProgrami(dersProgrami.filter(p => p.id !== plan.id));
        };

        const programKaydet = () => {
            if(!programForm.ogrenciId || !programForm.gun) return;
            const bas = `${String(programForm.basSaat).padStart(2,"0")}:${String(programForm.basDakika).padStart(2,"0")}`;
            const bit = `${String(programForm.bitSaat).padStart(2,"0")}:${String(programForm.bitDakika).padStart(2,"0")}`;
            setDersProgrami([...dersProgrami, { id: Date.now(), ogrenciId: Number(programForm.ogrenciId), gun: programForm.gun, baslangic: bas, bitis: bit, tarih: seciliTarih }]);
            setProgramForm({ ogrenciId: "", gun: "", basSaat: "", basDakika: "", bitSaat: "", bitDakika: "" });
        };

        const bugunDersler = dersProgrami.filter(p => p.tarih === bugunStr);
        const toplamKazanc = dersler.reduce((sum, d) => sum + Number(d.ucret || 0), 0);
        const bekleyenOdeme = dersler.filter(d => !d.odendi).reduce((sum, d) => sum + Number(d.ucret || 0), 0);

        return (
            <div className="min-h-screen pb-20">
                <div className="bg-white shadow px-4 py-4 sticky top-0 z-10 flex justify-between items-center">
                    <div>
                        <h1 className="text-xl font-bold text-indigo-600">📚 Ders Paneli</h1>
                        <p className="text-gray-500 text-xs">Yeni Temiz Altyapı</p>
                    </div>
                    <button onClick={() => setIsPremium(!isPremium)} className={`text-xs px-3 py-1.5 rounded-lg font-bold ${isPremium ? "bg-purple-600 text-white" : "bg-gray-100 text-gray-700"}`}>
                        {isPremium ? "💎 Premium" : "🆓 Free Mod"}
                    </button>
                </div>

                <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div className="bg-indigo-600 text-white p-4 rounded-xl shadow">
                        <p className="text-xs opacity-80">Bugün</p>
                        <h3 className="text-xl font-bold">{bugunDersler.length} Ders</h3>
                    </div>
                    <div className="bg-green-600 text-white p-4 rounded-xl shadow">
                        <p className="text-xs opacity-80">Kazanç</p>
                        <h3 className="text-xl font-bold">₺{toplamKazanc}</h3>
                    </div>
                </div>

                <div className="grid grid-cols-3 gap-1 px-4 mb-4">
                    {['program', 'ogrenciler', 'odevler'].map(t => (
                        <button key={t} onClick={() => setActiveTab(t)} className={`py-2 text-xs font-bold rounded-lg ${activeTab === t ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 shadow-sm'}`}>
                            {t.toUpperCase()}
                        </button>
                    ))}
                </div>

                {activeTab === 'program' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <h3 className="font-bold mb-3 text-sm">🗓 Ders Programı</h3>
                        <div className="space-y-2">
                            {dersProgrami.map(p => (
                                <div key={p.id} className="p-3 border rounded-lg flex justify-between items-center">
                                    <div>
                                        <p className="font-bold text-sm">{getOgrenciAd(p.ogrenciId)}</p>
                                        <p className="text-xs text-gray-500">{p.gun} | {p.baslangic}-{p.bitis}</p>
                                    </div>
                                    <button onClick={() => dersGerceklesti(p)} className="bg-green-600 text-white text-xs px-3 py-1 rounded">Geldi</button>
                                </div>
                            ))}
                        </div>
                        <div className="mt-4 p-3 bg-gray-50 rounded-xl">
                            <p className="text-xs font-bold mb-2">Hızlı Program Ekle</p>
                            <select onChange={e=>setProgramForm({...programForm, ogrenciId: e.target.value})} className="w-full text-xs p-2 border rounded mb-2">
                                <option value="">Öğrenci Seç</option>
                                {ogrenciler.map(o=><option key={o.id} value={o.id}>{o.ad}</option>)}
                            </select>
                            <select onChange={e=>setProgramForm({...programForm, gun: e.target.value})} className="w-full text-xs p-2 border rounded mb-2">
                                <option value="">Gün Seç</option>
                                <option>Pazartesi</option><option>Salı</option><option>Çarşamba</option><option>Perşembe</option><option>Cuma</option><option>Cumartesi</option><option>Pazar</option>
                            </select>
                            <button onClick={programKaydet} className="w-full bg-indigo-600 text-white text-xs py-2 rounded font-bold">Programa Ekle</button>
                        </div>
                    </div>
                )}

                {activeTab === 'ogrenciler' && (
                    <div className="p-4 bg-white m-4 rounded-xl shadow">
                        <div className="flex justify-between mb-3"><h3 className="font-bold text-sm">Students</h3><button onClick={() => {setOgrenciForm({ad:'',telefon:'',sinif:'',ucret:''}); setEditingId(null); setShowOgrenciModal(true);}} className="bg-indigo-600 text-white text-xs px-2 py-1 rounded">+ Yeni</button></div>
                        <div className="space-y-2">
                            {ogrenciler.map(o => (
                                <div key={o.id} className="p-3 border rounded-lg flex justify-between">
                                    <div><p className="font-bold text-sm">{o.ad}</p><p className="text-xs text-gray-500">₺{o.ucret} / Sınıf: {o.sinif}</p></div>
                                    <button onClick={()=>ogrenciSil(o.id)} className="text-red-600 text-xs">Sil</button>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {showOgrenciModal && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div className="bg-white p-4 rounded-xl w-full max-w-xs">
                            <input type="text" placeholder="Ad Soyad" value={ogrenciForm.ad} onChange={e=>setOgrenciForm({...ogrenciForm, ad:e.target.value})} className="w-full p-2 border rounded text-xs mb-2"/>
                            <input type="number" placeholder="Ücret" value={ogrenciForm.ucret} onChange={e=>setOgrenciForm({...ogrenciForm, ucret:e.target.value})} className="w-full p-2 border rounded text-xs mb-3"/>
                            <div className="flex gap-2"><button onClick={ogrenciKaydet} className="bg-indigo-600 text-white text-xs py-2 rounded flex-1">Kaydet</button><button onClick={()=>setShowOgrenciModal(false)} className="bg-gray-200 text-xs py-2 rounded flex-1">Kapat</button></div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    ReactDOM.render(<DersPanel />, document.getElementById('root'));
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/derspaneli/service-worker.js')
  .then(reg => console.log("SW Kayıtlı", reg))
  .catch(err => console.error("SW Hata", err));
}
</script>

<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if (splash) {
      splash.classList.add("fade-out");
      setTimeout(() => splash.remove(), 600);
    }
  }, 1200);
});
</script>

</body>
</html>
